    Values are additive and can create bright glow or bloom. Values that are too negative can disable the effect. Mixing positive and negative values can produce unusual glow, such as (R,G,B)=(+5, -5, -1.8)
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_contentw_text: |-
    Chooses the Supporter Upgrade DLC overlay pattern. This only has a visible effect if the Supporter Upgrade DLC is installed. The pattern is "additive", so the color must be brighter than black to be visible.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryx_text: |-
    Controls the matte-to-shiny response for the duller regions of the primary material. Lower values look flatter and more painted; higher values produce sharper reflected-light highlights. Values near 1 are almost mirror-like.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryy_text: |-
    Controls the matte-to-shiny response for the middle regions of the primary material (the areas that are not marked as "dullest" nor "smoothest"). Higher values produce sharper reflected-light highlights. Values near 1 are almost mirror-like.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryz_text: |-
    Controls the matte-to-shiny response for the brightest or most polished regions of the primary material. Higher values produce sharper reflected-light highlights. Values near 1 are almost mirror-like.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryw_text: |-
    Controls "metalness" for the primary material. Around 0 behaves more like paint or plastic: the angle of the material doesn't affect how it looks. Around 1 behaves more like metal: the angle of the material does affect how that part of the material looks. Values outside 0 to 1 are experimental. Negative values seem to "glow", and larger positive values affect brightness of smooth-shininess and can cause exotic color effects, especially with mixed RGB values like (R,G,B)=(1.2, 0.5, 0.8) or (1.2, 0.4, 1.2), with a mix of above-1 and below-1 values.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs. When using large 'W' values, turn down X,Y,Z shininess to help avoid this.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_secondaryx_text: |-
    Controls the matte-to-shiny response for the duller regions of the secondary material. Lower values look flatter and more painted; higher values produce sharper reflected-light highlights. Values near 1 are almost mirror-like.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_secondaryy_text: |-
