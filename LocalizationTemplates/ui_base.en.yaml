# English source template for LiveryGUI localization edits.
# Translate values only. Do not translate YAML keys beginning with livery_gui_.
# Preserve placeholders such as {0}, sprite tags such as [sp=s_icon_l32_cancel], and names such as LiveryGUI and Player.log.
# Prefer Phantom Brigade terminology from existing localized game text for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
edits:
# Tooltip header. Keep brief.
  livery_gui_toggle_header: |-
    Livery GUI
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_toggle_text: |-
    Show/hide advanced livery customization options
# Tooltip header. Keep brief.
  livery_gui_pilot_mode_toggle_header: |-
    Toggle Pilot Livery-Set Editing Mode
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_pilot_mode_toggle_text: |-
    In this mode, the selected pilot's livery set is edited by assigning liveries to the mech's parts. Mech parts that have no pilot livery are transparent and will show the mech's livery. For example, it is possible to paint a mech gray in mech edit mode, then enable pilot edit mode and assign a red livery to the upper body. Whenever that pilot is piloting that mech, the mech will be gray with a red upper body. Any mech this pilot is assigned to will have a red upper body.
# Tooltip header. Keep brief.
  livery_gui_pilot_mode_base_toggle_header: |-
    Show/Hide Mech Livery
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_pilot_mode_base_toggle_text: |-
    Shows or hides the mech's base livery underneath the pilot's livery. Only the view in this editor is affected. Right click on livery slots to unassign the pilot's livery from that slot. Note: Assigning a livery to a slot with a '+' also affects all parts contained within that slot.
# Tooltip header. Keep brief.
  livery_gui_previous_pilot_header: |-
    Previous Pilot
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_previous_pilot_text: |-
    Select the previous pilot. This controls which pilot's livery set is being edited in pilot livery-set editing mode. This does not assign the pilot to the mech; assigning a pilot to a mech is done in mission briefing.
# Tooltip header. Keep brief.
  livery_gui_next_pilot_header: |-
    Next Pilot
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_next_pilot_text: |-
    Select the next pilot. This controls which pilot's livery set is being edited in pilot livery-set editing mode. This does not assign the pilot to the mech; assigning a pilot to a mech is done in mission briefing.
# Tooltip header. Keep brief.
  livery_gui_reset_button_header: |-
    Revert Changes
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_reset_button_text: |-
    Reset this livery to its last saved values.
# Tooltip header. Keep brief.
  livery_gui_save_button_header: |-
    Save Livery
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_save_button_text: |-
    Save this livery, using the given name. The name used must not match any built-in livery, nor any livery provided by a mod. Using a name that does not exist yet will save to a new livery with that name.
# Tooltip header. Keep brief.
  livery_gui_favorite_button_header: |-
    Toggle as Favorite
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_favorite_button_text: |-
    Marks this livery as a favorite. Favorites are kept at the front of the list of liveries.
# Tooltip header. Keep brief.
  livery_gui_hints_header: |-
    Hints
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_hints_basic_text: |-
    Click on sliders or click-and-drag to set.
    
    Remember to save.
    Normal values for sliders are between 0 and 1. Other values might work, but they might cause problems.
    
    You can use keyboard "Move Camera" (Move Up/Down/Left/Right) keys to adjust view.
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_hints_precise_left_text: |-
    For precise adjustments:
    Right-click-and-hold, and move mouse <--->
    Change speed: Hold SHIFT, ALT, or CTRL.
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_hints_precise_drag_text: |-
    For precise adjustments:
    Right-click-and-hold, and move mouse <--->
    Change speed: Hold SHIFT, ALT, or CTRL.
# Tooltip header. Keep brief.
  livery_gui_pilot_livery_slot_marker_header: |-
    Pilot livery
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_pilot_livery_slot_marker_text: |-
    The pilot's own livery-set is applied to this slot. This livery will be applied to this slot of any mech that is piloted by this pilot. Note: Any slot marked with a '+' has child slots, which will be affected by the parent slot.
# Tooltip header. Keep brief.
  livery_gui_mech_livery_slot_marker_header: |-
    Mech base livery
# Tooltip body. Prefer Phantom Brigade terminology for mech, unit, pilot, base, mission briefing, and livery/paint scheme.
  livery_gui_mech_livery_slot_marker_text: |-
    No pilot livery has been assigned to this slot. The mech's own base livery will control this slot. Assigning a livery to this slot will assign the livery to the pilot's livery-set.
