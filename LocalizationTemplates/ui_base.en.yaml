# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryr_text: |-
    Sets the red amount for the primary areas of the livery.
    
    Primary, secondary, and tertiary are different areas on each mech part. Normal color values are usually 0 to 1. Values above 1 can make colors brighter.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryg_text: |-
    Sets the green amount for the primary areas of the livery.
    
    Primary, secondary, and tertiary are different areas on each mech part. Normal color values are usually 0 to 1. Values above 1 can make colors brighter.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primaryb_text: |-
    Sets the blue amount for the primary areas of the livery.
    
    Primary, secondary, and tertiary are different areas on each mech part. Normal color values are usually 0 to 1. Values above 1 can make colors brighter.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_primarya_text: |-
    Adjusts how strongly the primary color is applied. Around 1 is the normal look. Lower or negative values tend to brighten or wash the color toward white; higher values darken it toward black, with a unique interaction with colors brighter than 1.
    
    This behaves more like a brightness/contrast control than ordinary transparency, and extreme values can produce unusual results.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_secondaryr_text: |-
    Sets the red amount for the secondary areas of the livery.
    
    Primary, secondary, and tertiary are different areas on each mech part. Normal color values are usually 0 to 1. Values above 1 can make colors brighter.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
