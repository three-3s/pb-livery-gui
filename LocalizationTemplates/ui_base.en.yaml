# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_contentx_text: |-
    Sets the red amount for the Supporter Upgrade DLC overlay pattern. This only has a visible effect if the Supporter Upgrade DLC is installed and a pattern other than "none" is selected (the Supporter DLC W setting).
    
    Values are additive and can create bright glow or bloom. Values that are too negative can disable the effect. Mixing positive and negative values can produce unusual glow, such as (R,G,B)=(+5, -5, -1.8)
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_contenty_text: |-
    Sets the green amount for the Supporter Upgrade DLC overlay pattern. This only has a visible effect if the Supporter Upgrade DLC is installed and a pattern other than "none" is selected (the Supporter DLC W setting).
    
    Values are additive and can create bright glow or bloom. Values that are too negative can disable the effect. Mixing positive and negative values can produce unusual glow, such as (R,G,B)=(+5, -5, -1.8)
# Tooltip body for a slider or selector help button. Can be longer than labels, but avoid expanding into multiple paragraphs beyond the English structure.
  livery_gui_slider_contentz_text: |-
