  livery_gui_slider_effectx_text: |-
    Controls "iridescence" for the primary paint areas. Positive values tend toward stronger rainbow iridescence. Negative values tend toward a pearlescent look. Values near 0 have little or no effect. Large values (positive or negative) will look "unusual". "Metalness" and the part's R,G,B color affect how this looks.
    
    Extremely bright parts, especially when shiny, can cause major visual bugs.
