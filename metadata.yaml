name: Livery GUI - Edit mech colors & materials
desc: >-
  Adds a livery editor that lets you customize livery colors and material properties, save them as new liveries, and apply them to your mechs.


  Can also assign liveries to pilots (affecting whatever mech they pilot).


  Go to the "mech paint" part of the base, and click on the new "sliders" button. Choose a livery to start from, give it a new name (if necessary/desired), and click SAVE. Adjust the sliders to your liking. Remember to SAVE any changes to your livery.
