  livery_gui_slider_effectx_text: |-
    控制主色涂漆区域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“异常”。“金属感”和部件的 R,G,B 颜色会影响其外观。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_effecty_text: |-
    控制副色涂漆区域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“异常”。“金属感”和部件的 R,G,B 颜色会影响其外观。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_effectz_text: |-
    控制第三色涂漆区域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“异常”。“金属感”和部件的 R,G,B 颜色会影响其外观。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_effectw_text: |-
    保留的效果值。目前似乎没有可见效果，但仍会保存以便完整性和实验。
