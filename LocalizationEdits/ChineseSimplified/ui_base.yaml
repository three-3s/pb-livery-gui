  livery_gui_slider_primaryr_text: |-
    设置涂装主色区域的红色量。
    
    主色、副色和第三色是每个机甲部件上的不同区域。普通颜色值通常为0到1。大于1的值可以让颜色更亮。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primaryg_text: |-
    设置涂装主色区域的绿色量。
    
    主色、副色和第三色是每个机甲部件上的不同区域。普通颜色值通常为0到1。大于1的值可以让颜色更亮。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primaryb_text: |-
    设置涂装主色区域的蓝色量。
    
    主色、副色和第三色是每个机甲部件上的不同区域。普通颜色值通常为0到1。大于1的值可以让颜色更亮。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primarya_text: |-
    调整主色应用的强度。约为1时是正常外观。较低或负数值通常会让颜色变亮或洗成白色；较高数值会让颜色变暗趋向黑色，并且会与大于1的亮色产生特殊互动。
    
    它更像亮度/对比度控制，而不是普通透明度；极端值可能产生异常结果。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_secondaryr_text: |-
    设置涂装副色区域的红色量。
    
    主色、副色和第三色是每个机甲部件上的不同区域。普通颜色值通常为0到1。大于1的值可以让颜色更亮。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_secondaryg_text: |-
