edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    显示/隐藏高级涂装自定义选项
  livery_gui_pilot_mode_toggle_header: |-
    切换驾驶员涂装集编辑模式
  livery_gui_pilot_mode_toggle_text: |-
    在此模式中，你通过给机甲部件分配涂装来编辑所选驾驶员的涂装集。没有驾驶员涂装的机甲部件会保持透明，显示机甲自身的涂装。例如，可以在机甲编辑模式中把机甲涂成灰色，然后启用驾驶员编辑模式并给上半身分配红色涂装。只要该驾驶员驾驶这台机甲，机甲就会显示为灰色并带有红色上半身。该驾驶员分配到任何机甲时，都会让其上半身变为红色。
  livery_gui_pilot_mode_base_toggle_header: |-
    显示/隐藏机甲涂装
  livery_gui_pilot_mode_base_toggle_text: |-
    显示或隐藏驾驶员涂装下方的机甲基础涂装。只影响此编辑器中的显示。右键点击涂装槽可取消该槽的驾驶员涂装。注意：给带有“+”的槽分配涂装也会影响该槽包含的所有部件。
  livery_gui_previous_pilot_header: |-
    上一名驾驶员
  livery_gui_previous_pilot_text: |-
    选择上一名驾驶员。这会控制驾驶员涂装集编辑模式中正在编辑哪名驾驶员的涂装集。此操作不会把驾驶员分配给机甲；驾驶员分配需要在任务简报中完成。
  livery_gui_next_pilot_header: |-
    下一名驾驶员
  livery_gui_next_pilot_text: |-
    选择下一名驾驶员。这会控制驾驶员涂装集编辑模式中正在编辑哪名驾驶员的涂装集。此操作不会把驾驶员分配给机甲；驾驶员分配需要在任务简报中完成。
  livery_gui_reset_button_header: |-
    还原更改
  livery_gui_reset_button_text: |-
    将此涂装重置为上次保存的数值。
  livery_gui_save_button_header: |-
    保存涂装
  livery_gui_save_button_text: |-
    使用给定名称保存此涂装。名称不能与内置涂装或其他模组提供的涂装相同。使用尚不存在的名称会以该名称保存为新的涂装。
  livery_gui_favorite_button_header: |-
    切换收藏
  livery_gui_favorite_button_text: |-
    将此涂装标记为收藏。收藏会保留在涂装列表前方。
  livery_gui_hints_header: |-
    提示
  livery_gui_hints_basic_text: |-
    点击滑块或点击并拖动来设置。
    
    记得保存。
    滑块的正常值通常在0到1之间。其他值可能有效，但也可能导致问题。
    
    可使用键盘“移动相机”（上/下/左/右移动）按键来调整视角。
  livery_gui_hints_precise_left_text: |-
    精细调整：
    按住右键并左右移动鼠标。
    改变速度：按住 SHIFT、ALT 或 CTRL。
  livery_gui_hints_precise_drag_text: |-
    精细调整：
    按住右键并左右移动鼠标。
    改变速度：按住 SHIFT、ALT 或 CTRL。
  livery_gui_pilot_livery_slot_marker_header: |-
    驾驶员涂装
  livery_gui_pilot_livery_slot_marker_text: |-
    驾驶员自己的涂装集会应用到此槽。该驾驶员驾驶任何机甲时，此涂装都会应用到对应槽。注意：带有“+”的槽有子槽，会受父槽影响。
  livery_gui_mech_livery_slot_marker_header: |-
    机甲基础涂装
  livery_gui_mech_livery_slot_marker_text: |-
    此槽没有分配驾驶员涂装。机甲自身的基础涂装将控制此槽。给此槽分配涂装会把该涂装分配到驾驶员涂装集。
  livery_gui_livery_name_input: |-
    涂装名称
  livery_gui_pilot_none: |-
    [无]
  livery_gui_supporter_pattern_none: |-
    无 (w=0.0)
  livery_gui_supporter_pattern_dots: |-
    点 (w=1.0)
  livery_gui_supporter_pattern_lines: |-
    线 (w=2.0)
  livery_gui_supporter_pattern_sheen: |-
    光泽 (w=3.0)
  livery_gui_message_load_failed: |-
    LiveryGUI：无法加载 {0} 个涂装。更多信息请查看 Player.log。 [sp=s_text_24_exclamation]
  livery_gui_message_save_blocked_name: |-
    不行。请更改涂装名称。LiveryGUI 不拥有当前名称。 [sp=s_icon_l32_cancel]
  livery_gui_message_save_failed: |-
    保存失败。更多信息请查看 Player.log。 [sp=s_text_24_exclamation]
  livery_gui_message_livery_name_exists: |-
    不行。已有同名涂装。 [sp=s_icon_l32_cancel]
  livery_gui_message_save_livery_sets_error: |-
    保存涂装集时出错 (LiveryGUI)。 [sp=s_icon_l32_cancel]
