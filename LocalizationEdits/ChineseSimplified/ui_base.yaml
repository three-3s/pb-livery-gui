    它更像亮度/对比度控制，而不是普通透明度；极端值可能产生异常结果。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_contentx_text: |-
    设置 Supporter Upgrade DLC 叠加图案的红色量。只有安装了 Supporter Upgrade DLC 且选择了“无”以外的图案（Supporter DLC W 设置）时才可见。
    
    这些值是加性的，可以产生明亮辉光或泛光。过于负的值可能禁用效果。混合正值和负值可能产生异常辉光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    设置 Supporter Upgrade DLC 叠加图案的绿色量。只有安装了 Supporter Upgrade DLC 且选择了“无”以外的图案（Supporter DLC W 设置）时才可见。
    
    这些值是加性的，可以产生明亮辉光或泛光。过于负的值可能禁用效果。混合正值和负值可能产生异常辉光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
    设置 Supporter Upgrade DLC 叠加图案的蓝色量。只有安装了 Supporter Upgrade DLC 且选择了“无”以外的图案（Supporter DLC W 设置）时才可见。
    
    这些值是加性的，可以产生明亮辉光或泛光。过于负的值可能禁用效果。混合正值和负值可能产生异常辉光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    选择 Supporter Upgrade DLC 叠加图案。只有安装了 Supporter Upgrade DLC 时才可见。该图案是“加性”的，因此颜色必须比黑色更亮才可见。
  livery_gui_slider_primaryx_text: |-
    控制主色材质较暗区域从哑光到高光的反应。较低值看起来更平、更像涂漆；较高值会产生更锐利的反光高光。接近1的值几乎像镜面。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primaryy_text: |-
    控制主色材质中间区域（既不是“最暗”也不是“最光滑”的区域）从哑光到高光的反应。较高值会产生更锐利的反光高光。接近1的值几乎像镜面。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primaryz_text: |-
    控制主色材质最亮或最抛光区域从哑光到高光的反应。较高值会产生更锐利的反光高光。接近1的值几乎像镜面。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_primaryw_text: |-
    控制主色材质的“金属感”。约为0时更像涂漆或塑料：材质角度不会影响外观。约为1时更像金属：材质角度会影响该区域的外观。0到1之外的值属于实验性质。负值似乎会“发光”，较大的正值会影响平滑高光的亮度，并可能造成特殊颜色效果，尤其在混合 RGB 值如 (R,G,B)=(1.2, 0.5, 0.8) 或 (1.2, 0.4, 1.2) 时。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。使用较大的 W 值时，请降低 X,Y,Z 光泽度以帮助避免问题。
  livery_gui_slider_secondaryx_text: |-
    控制副色材质较暗区域从哑光到高光的反应。较低值看起来更平、更像涂漆；较高值会产生更锐利的反光高光。接近1的值几乎像镜面。
    
    过亮的部件，尤其在高光泽时，可能造成严重视觉错误。
  livery_gui_slider_secondaryy_text: |-
