edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Mostra/nasconde le opzioni avanzate di personalizzazione delle verniciature
  livery_gui_pilot_mode_toggle_header: |-
    Attiva/disattiva modifica verniciature pilota
  livery_gui_pilot_mode_toggle_text: |-
    In questa modalità modifichi il set di verniciature del pilota selezionato assegnando verniciature alle parti del mech. Le parti senza verniciatura pilota sono trasparenti e mostrano la verniciatura del mech. Per esempio, puoi verniciare un mech di grigio in modalità mech, poi attivare la modalità pilota e assegnare una verniciatura rossa alla parte superiore del corpo. Quando quel pilota guida quel mech, il mech sarà grigio con la parte superiore rossa. Qualsiasi mech assegnato a quel pilota avrà la parte superiore rossa.
  livery_gui_pilot_mode_base_toggle_header: |-
    Mostra/nascondi verniciatura del mech
  livery_gui_pilot_mode_base_toggle_text: |-
    Mostra o nasconde la verniciatura base del mech sotto la verniciatura del pilota. Influisce solo sulla vista in questo editor. Fai clic destro sugli slot verniciatura per rimuovere la verniciatura pilota da quello slot. Nota: assegnare una verniciatura a uno slot con + influisce anche su tutte le parti contenute in quello slot.
  livery_gui_previous_pilot_header: |-
    Pilota precedente
  livery_gui_previous_pilot_text: |-
    Seleziona il pilota precedente. Controlla quale set di verniciature pilota viene modificato nella modalità di modifica verniciature pilota. Non assegna il pilota al mech; assegnazione si effettua nel briefing della missione.
  livery_gui_next_pilot_header: |-
    Pilota successivo
  livery_gui_next_pilot_text: |-
    Seleziona il pilota successivo. Controlla quale set di verniciature pilota viene modificato nella modalità di modifica verniciature pilota. Non assegna il pilota al mech; assegnazione si effettua nel briefing della missione.
  livery_gui_reset_button_header: |-
    Annulla modifiche
  livery_gui_reset_button_text: |-
    Ripristina questa verniciatura agli ultimi valori salvati.
  livery_gui_save_button_header: |-
    Salva verniciatura
  livery_gui_save_button_text: |-
    Salva questa verniciatura con il nome indicato. Il nome non deve corrispondere a una verniciatura integrata né a una fornita da un mod. Usare un nome nuovo salverà una nuova verniciatura con quel nome.
  livery_gui_favorite_button_header: |-
    Attiva/disattiva preferito
  livery_gui_favorite_button_text: |-
    Contrassegna questa verniciatura come preferita. Le preferite restano al inizio della lista.
  livery_gui_hints_header: |-
    Suggerimenti
  livery_gui_hints_basic_text: |-
    Fai clic sugli slider o fai clic e trascina per impostare.
    
    Ricorda di salvare.
    I valori normali degli slider sono tra 0 e 1. Altri valori possono funzionare, ma possono causare problemi.
    
    Puoi usare i tasti Sposta telecamera (su/giù/sinistra/destra) per regolare la vista.
  livery_gui_hints_precise_left_text: |-
    Per regolazioni precise:
    tieni premuto il tasto destro e muovi il mouse a sinistra/destra.
    Cambia velocità: tieni premuto SHIFT, ALT o CTRL.
  livery_gui_hints_precise_drag_text: |-
    Per regolazioni precise:
    tieni premuto il tasto destro e muovi il mouse a sinistra/destra.
    Cambia velocità: tieni premuto SHIFT, ALT o CTRL.
  livery_gui_pilot_livery_slot_marker_header: |-
    Verniciatura pilota
  livery_gui_pilot_livery_slot_marker_text: |-
    Il set di verniciature proprio del pilota viene applicato a questo slot. Questa verniciatura verrà applicata allo stesso slot di qualsiasi mech pilotato da questo pilota. Nota: ogni slot marcato con + ha slot figli che saranno influenzati dallo slot padre.
  livery_gui_mech_livery_slot_marker_header: |-
    Verniciatura base mech
  livery_gui_mech_livery_slot_marker_text: |-
    A questo slot non è stata assegnata alcuna verniciatura pilota. La verniciatura base del mech controlla questo slot. Assegnare qui una verniciatura la assegnerà al set di verniciature del pilota.
