  livery_gui_slider_primaryr_text: |-
    Imposta la quantità di rosso per le aree primaria della verniciatura.
    
    le aree primaria, secondaria e terza sono aree diverse su ogni parte del mech. I valori colore normali sono di solito tra 0 e 1. Valori superiori a 1 possono rendere i colori più luminosi.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primaryg_text: |-
    Imposta la quantità di verde per le aree primaria della verniciatura.
    
    le aree primaria, secondaria e terza sono aree diverse su ogni parte del mech. I valori colore normali sono di solito tra 0 e 1. Valori superiori a 1 possono rendere i colori più luminosi.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primaryb_text: |-
    Imposta la quantità di blu per le aree primaria della verniciatura.
    
    le aree primaria, secondaria e terza sono aree diverse su ogni parte del mech. I valori colore normali sono di solito tra 0 e 1. Valori superiori a 1 possono rendere i colori più luminosi.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primarya_text: |-
    Regola quanto intensamente viene applicato il colore primaria. Intorno a 1 è aspetto normale. Valori più bassi o negativi tendono a schiarire o slavare il colore verso il bianco; valori più alti lo scuriscono verso il nero, con una interazione particolare con colori più luminosi di 1.
    
    Si comporta più come un controllo di luminosità/contrasto che come normale trasparenza, e valori estremi possono produrre risultati insoliti.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_secondaryr_text: |-
    Imposta la quantità di rosso per le aree secondaria della verniciatura.
    
