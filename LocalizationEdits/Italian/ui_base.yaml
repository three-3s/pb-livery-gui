  livery_gui_slider_effectx_text: |-
    Controlla iridescenza delle aree di vernice primaria. Valori positivi tendono a una iridescenza arcobaleno più forte. Valori negativi tendono a un aspetto perlato. Valori vicini a 0 hanno poco o nessun effetto. Valori grandi, positivi o negativi, appariranno insoliti. Aspetto metallico e colore R,G,B della parte influenzano il risultato.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
