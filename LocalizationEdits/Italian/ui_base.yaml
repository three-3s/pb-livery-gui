  livery_gui_slider_contentx_text: |-
    Imposta la quantità di rosso del motivo sovrapposto del Supporter Upgrade DLC. Ha effetto visibile solo se il Supporter Upgrade DLC è installato e viene selezionato un motivo diverso da nessuno (impostazione Supporter DLC W).
    
    I valori sono additivi e possono creare bagliore o bloom luminoso. Valori troppo negativi possono disattivare effetto. Mescolare valori positivi e negativi può produrre bagliori insoliti, come (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Imposta la quantità di verde del motivo sovrapposto del Supporter Upgrade DLC. Ha effetto visibile solo se il Supporter Upgrade DLC è installato e viene selezionato un motivo diverso da nessuno (impostazione Supporter DLC W).
    
    I valori sono additivi e possono creare bagliore o bloom luminoso. Valori troppo negativi possono disattivare effetto. Mescolare valori positivi e negativi può produrre bagliori insoliti, come (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
    Imposta la quantità di blu del motivo sovrapposto del Supporter Upgrade DLC. Ha effetto visibile solo se il Supporter Upgrade DLC è installato e viene selezionato un motivo diverso da nessuno (impostazione Supporter DLC W).
    
    I valori sono additivi e possono creare bagliore o bloom luminoso. Valori troppo negativi possono disattivare effetto. Mescolare valori positivi e negativi può produrre bagliori insoliti, come (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Sceglie il motivo sovrapposto del Supporter Upgrade DLC. Ha effetto visibile solo se il Supporter Upgrade DLC è installato. Il motivo è additivo, quindi il colore deve essere più luminoso del nero per essere visibile.
  livery_gui_slider_primaryx_text: |-
    Controlla la risposta da opaco a lucido delle regioni più spente del materiale primaria. Valori bassi sembrano più piatti e verniciati; valori più alti producono riflessi più netti. Valori vicini a 1 sono quasi a specchio.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primaryy_text: |-
    Controlla la risposta da opaco a lucido delle regioni intermedie del materiale primaria. Valori più alti producono riflessi più netti. Valori vicini a 1 sono quasi a specchio.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primaryz_text: |-
    Controlla la risposta da opaco a lucido delle regioni più luminose o lucidate del materiale primaria. Valori più alti producono riflessi più netti. Valori vicini a 1 sono quasi a specchio.
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi.
  livery_gui_slider_primaryw_text: |-
    Controlla aspetto metallico del materiale primaria. Intorno a 0 si comporta più come vernice o plastica: angolo del materiale non ne influenza aspetto. Intorno a 1 si comporta più come metallo: angolo del materiale influenza aspetto di quella parte. Valori fuori da 0 a 1 sono sperimentali. Valori negativi sembrano brillare, e valori positivi grandi influenzano luminosità dei riflessi lisci e possono causare effetti cromatici esotici, soprattutto con valori RGB misti come (R,G,B)=(1.2, 0.5, 0.8) o (1.2, 0.4, 1.2).
    
    Parti estremamente luminose, soprattutto se lucide, possono causare gravi problemi visivi. Con valori W grandi, abbassa la brillantezza X,Y,Z per aiutare a evitarlo.
  livery_gui_slider_secondaryx_text: |-
    Controlla la risposta da opaco a lucido delle regioni più spente del materiale secondaria. Valori bassi sembrano più piatti e verniciati; valori più alti producono riflessi più netti. Valori vicini a 1 sono quasi a specchio.
    
