edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Показать/скрыть расширенные настройки окраски
  livery_gui_pilot_mode_toggle_header: |-
    Переключить режим окраски пилота
  livery_gui_pilot_mode_toggle_text: |-
    В этом режиме набор окраски выбранного пилота редактируется назначением окрасок частям меха. Части меха без окраски пилота прозрачны и показывают окраску самого меха. Например, можно покрасить мех в серый в режиме меха, затем включить режим пилота и назначить красную окраску верхней части корпуса. Когда этот пилот управляет этим мехом, мех будет серым с красной верхней частью. У любого меха, назначенного этому пилоту, верхняя часть будет красной.
  livery_gui_pilot_mode_base_toggle_header: |-
    Показать/скрыть окраску меха
  livery_gui_pilot_mode_base_toggle_text: |-
    Показывает или скрывает базовую окраску меха под окраской пилота. Это влияет только на вид в редакторе. Щелкните правой кнопкой по слотам окраски, чтобы снять окраску пилота с этого слота. Примечание: назначение окраски слоту с + также влияет на все части внутри этого слота.
  livery_gui_previous_pilot_header: |-
    Предыдущий пилот
  livery_gui_previous_pilot_text: |-
    Выбирает предыдущего пилота. Это определяет, какой набор окраски пилота редактируется в режиме окраски пилота. Это не назначает пилота меху; назначение выполняется в брифинге задания.
  livery_gui_next_pilot_header: |-
    Следующий пилот
  livery_gui_next_pilot_text: |-
    Выбирает следующего пилота. Это определяет, какой набор окраски пилота редактируется в режиме окраски пилота. Это не назначает пилота меху; назначение выполняется в брифинге задания.
  livery_gui_reset_button_header: |-
    Отменить изменения
  livery_gui_reset_button_text: |-
    Возвращает эту окраску к последним сохраненным значениям.
  livery_gui_save_button_header: |-
    Сохранить окраску
  livery_gui_save_button_text: |-
    Сохраняет эту окраску под указанным названием. Название не должно совпадать со встроенной окраской или окраской из другого мода. Новое название сохранит новую окраску с этим названием.
  livery_gui_favorite_button_header: |-
    Переключить избранное
  livery_gui_favorite_button_text: |-
    Помечает эту окраску как избранную. Избранные окраски остаются в начале списка.
  livery_gui_hints_header: |-
    Подсказки
  livery_gui_hints_basic_text: |-
    Нажмите на ползунок или перетащите его для настройки.
    
    Не забудьте сохранить.
    Обычные значения ползунков — от 0 до 1. Другие значения могут работать, но могут вызвать проблемы.
    
    Можно использовать клавиши Двигать камеру (вверх/вниз/влево/вправо), чтобы изменить вид.
  livery_gui_hints_precise_left_text: |-
    Для точной настройки:
    удерживайте правую кнопку мыши и двигайте мышь влево/вправо.
    Изменение скорости: удерживайте SHIFT, ALT или CTRL.
  livery_gui_hints_precise_drag_text: |-
    Для точной настройки:
    удерживайте правую кнопку мыши и двигайте мышь влево/вправо.
    Изменение скорости: удерживайте SHIFT, ALT или CTRL.
  livery_gui_pilot_livery_slot_marker_header: |-
    Окраска пилота
  livery_gui_pilot_livery_slot_marker_text: |-
    Собственный набор окраски пилота применяется к этому слоту. Эта окраска будет применяться к этому слоту любого меха, которым управляет этот пилот. Примечание: у любого слота с + есть дочерние слоты, на которые влияет родительский слот.
  livery_gui_mech_livery_slot_marker_header: |-
    Базовая окраска меха
  livery_gui_mech_livery_slot_marker_text: |-
    Для этого слота не назначена окраска пилота. Им управляет базовая окраска меха. Назначение окраски этому слоту добавит ее в набор окраски пилота.
  livery_gui_livery_name_input: |-
    Название окраски
  livery_gui_pilot_none: |-
    [нет]
  livery_gui_supporter_pattern_none: |-
    нет (w=0.0)
  livery_gui_supporter_pattern_dots: |-
    точки (w=1.0)
  livery_gui_supporter_pattern_lines: |-
    линии (w=2.0)
  livery_gui_supporter_pattern_sheen: |-
    блеск (w=3.0)
  livery_gui_message_load_failed: |-
    LiveryGUI: не удалось загрузить окрасок: {0}. Подробнее см. Player.log. [sp=s_text_24_exclamation]
  livery_gui_message_save_blocked_name: |-
    Нет. Измените название окраски. LiveryGUI не владеет текущим названием. [sp=s_icon_l32_cancel]
  livery_gui_message_save_failed: |-
    Не удалось сохранить. Подробнее см. Player.log. [sp=s_text_24_exclamation]
  livery_gui_message_livery_name_exists: |-
    Нет. Окраска с таким названием уже существует. [sp=s_icon_l32_cancel]
  livery_gui_message_save_livery_sets_error: |-
