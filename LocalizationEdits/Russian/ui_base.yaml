  livery_gui_slider_contentx_text: |-
    Задает количество красного для накладываемого узора Supporter Upgrade DLC. Это видно только если установлен Supporter Upgrade DLC и выбран узор кроме нет (настройка Supporter DLC W).
    
    Значения аддитивные и могут создать яркое свечение или bloom. Слишком отрицательные значения могут отключить эффект. Смешивание положительных и отрицательных значений может дать необычное свечение, например (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Задает количество зеленого для накладываемого узора Supporter Upgrade DLC. Это видно только если установлен Supporter Upgrade DLC и выбран узор кроме нет (настройка Supporter DLC W).
    
    Значения аддитивные и могут создать яркое свечение или bloom. Слишком отрицательные значения могут отключить эффект. Смешивание положительных и отрицательных значений может дать необычное свечение, например (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
    Задает количество синего для накладываемого узора Supporter Upgrade DLC. Это видно только если установлен Supporter Upgrade DLC и выбран узор кроме нет (настройка Supporter DLC W).
    
    Значения аддитивные и могут создать яркое свечение или bloom. Слишком отрицательные значения могут отключить эффект. Смешивание положительных и отрицательных значений может дать необычное свечение, например (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Выбирает накладываемый узор Supporter Upgrade DLC. Это видно только если установлен Supporter Upgrade DLC. Узор аддитивный, поэтому цвет должен быть ярче черного, чтобы его было видно.
  livery_gui_slider_primaryx_text: |-
    Управляет переходом от матового к блестящему для более тусклых областей материала основной. Низкие значения выглядят более плоско и окрашенно; высокие дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primaryy_text: |-
    Управляет переходом от матового к блестящему для средних областей материала основной. Высокие значения дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primaryz_text: |-
    Управляет переходом от матового к блестящему для самых ярких или отполированных областей материала основной. Высокие значения дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primaryw_text: |-
    Управляет металлическим видом материала основной. Около 0 он ведет себя скорее как краска или пластик: угол материала не влияет на вид. Около 1 он ведет себя скорее как металл: угол материала влияет на вид этой части. Значения вне 0–1 экспериментальные. Отрицательные значения будто светятся, а большие положительные влияют на яркость гладких бликов и могут создавать необычные цветовые эффекты, особенно со смешанными RGB вроде (R,G,B)=(1.2, 0.5, 0.8) или (1.2, 0.4, 1.2).
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки. При больших значениях W уменьшайте блеск X,Y,Z, чтобы этого избежать.
  livery_gui_slider_secondaryx_text: |-
    Управляет переходом от матового к блестящему для более тусклых областей материала второй. Низкие значения выглядят более плоско и окрашенно; высокие дают более резкие световые блики. Значения около 1 почти зеркальные.
    
