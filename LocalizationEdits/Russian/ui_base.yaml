  livery_gui_slider_primaryr_text: |-
    Задает количество красного для основной зоны окраски.
    
    основные, вторые и третьи зоны — разные области на каждой части меха. Обычные значения цвета обычно от 0 до 1. Значения выше 1 могут сделать цвета ярче.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primaryg_text: |-
    Задает количество зеленого для основной зоны окраски.
    
    основные, вторые и третьи зоны — разные области на каждой части меха. Обычные значения цвета обычно от 0 до 1. Значения выше 1 могут сделать цвета ярче.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primaryb_text: |-
    Задает количество синего для основной зоны окраски.
    
    основные, вторые и третьи зоны — разные области на каждой части меха. Обычные значения цвета обычно от 0 до 1. Значения выше 1 могут сделать цвета ярче.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_primarya_text: |-
    Настраивает силу применения основной цвета. Около 1 — обычный вид. Более низкие или отрицательные значения осветляют или вымывают цвет к белому; более высокие затемняют его к черному, с особым взаимодействием с цветами ярче 1.
    
    Это больше похоже на яркость/контраст, чем на обычную прозрачность, а крайние значения могут давать необычные результаты.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_secondaryr_text: |-
    Задает количество красного для второй зоны окраски.
    
    основные, вторые и третьи зоны — разные области на каждой части меха. Обычные значения цвета обычно от 0 до 1. Значения выше 1 могут сделать цвета ярче.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
