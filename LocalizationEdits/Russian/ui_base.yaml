    Управляет металлическим видом материала второй. Около 0 он ведет себя скорее как краска или пластик: угол материала не влияет на вид. Около 1 он ведет себя скорее как металл: угол материала влияет на вид этой части. Значения вне 0–1 экспериментальные. Отрицательные значения будто светятся, а большие положительные влияют на яркость гладких бликов и могут создавать необычные цветовые эффекты, особенно со смешанными RGB вроде (R,G,B)=(1.2, 0.5, 0.8) или (1.2, 0.4, 1.2).
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки. При больших значениях W уменьшайте блеск X,Y,Z, чтобы этого избежать.
  livery_gui_slider_tertiaryx_text: |-
    Управляет переходом от матового к блестящему для более тусклых областей материала третьей. Низкие значения выглядят более плоско и окрашенно; высокие дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_tertiaryy_text: |-
    Управляет переходом от матового к блестящему для средних областей материала третьей. Высокие значения дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_tertiaryz_text: |-
    Управляет переходом от матового к блестящему для самых ярких или отполированных областей материала третьей. Высокие значения дают более резкие световые блики. Значения около 1 почти зеркальные.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_tertiaryw_text: |-
    Управляет металлическим видом материала третьей. Около 0 он ведет себя скорее как краска или пластик: угол материала не влияет на вид. Около 1 он ведет себя скорее как металл: угол материала влияет на вид этой части. Значения вне 0–1 экспериментальные. Отрицательные значения будто светятся, а большие положительные влияют на яркость гладких бликов и могут создавать необычные цветовые эффекты, особенно со смешанными RGB вроде (R,G,B)=(1.2, 0.5, 0.8) или (1.2, 0.4, 1.2).
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки. При больших значениях W уменьшайте блеск X,Y,Z, чтобы этого избежать.
  livery_gui_slider_effectx_text: |-
    Управляет радужным переливом основной окрашенных областей. Положительные значения усиливают радужный эффект. Отрицательные дают более перламутровый вид. Значения около 0 почти не влияют. Большие положительные или отрицательные значения будут выглядеть необычно. Металлический вид и цвет R,G,B части влияют на результат.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_effecty_text: |-
    Управляет радужным переливом второй окрашенных областей. Положительные значения усиливают радужный эффект. Отрицательные дают более перламутровый вид. Значения около 0 почти не влияют. Большие положительные или отрицательные значения будут выглядеть необычно. Металлический вид и цвет R,G,B части влияют на результат.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_effectz_text: |-
    Управляет радужным переливом третьей окрашенных областей. Положительные значения усиливают радужный эффект. Отрицательные дают более перламутровый вид. Значения около 0 почти не влияют. Большие положительные или отрицательные значения будут выглядеть необычно. Металлический вид и цвет R,G,B части влияют на результат.
    
    Чрезмерно яркие части, особенно с сильным блеском, могут вызвать серьезные визуальные ошибки.
  livery_gui_slider_effectw_text: |-
    Зарезервированное значение эффекта. Сейчас оно, похоже, не имеет видимого эффекта, но сохраняется для полноты и экспериментов.
