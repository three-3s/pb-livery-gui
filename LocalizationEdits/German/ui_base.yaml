  livery_gui_slider_primaryr_text: |-
    Legt den Rot-Anteil für die Hauptfarbe-Bereiche der Lackierung fest.
    
    Haupt-, Neben- und dritte Farbbereiche sind unterschiedliche Bereiche auf jedem Mech-Teil. Normale Farbwerte liegen meist zwischen 0 und 1. Werte über 1 können Farben heller machen.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primaryg_text: |-
    Legt den Grün-Anteil für die Hauptfarbe-Bereiche der Lackierung fest.
    
    Haupt-, Neben- und dritte Farbbereiche sind unterschiedliche Bereiche auf jedem Mech-Teil. Normale Farbwerte liegen meist zwischen 0 und 1. Werte über 1 können Farben heller machen.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primaryb_text: |-
    Legt den Blau-Anteil für die Hauptfarbe-Bereiche der Lackierung fest.
    
    Haupt-, Neben- und dritte Farbbereiche sind unterschiedliche Bereiche auf jedem Mech-Teil. Normale Farbwerte liegen meist zwischen 0 und 1. Werte über 1 können Farben heller machen.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primarya_text: |-
    Passt an, wie stark die Hauptfarbe angewendet wird. Um 1 entspricht dem normalen Aussehen. Niedrigere oder negative Werte hellen die Farbe oft Richtung Weiß auf; höhere Werte dunkeln sie Richtung Schwarz ab und reagieren besonders mit Farben über 1.
    
    Dies verhält sich eher wie Helligkeit/Kontrast als wie normale Transparenz, und Extremwerte können ungewöhnliche Ergebnisse erzeugen.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
