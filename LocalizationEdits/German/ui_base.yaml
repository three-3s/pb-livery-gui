    Die Werte sind additiv und können helles Leuchten oder Bloom erzeugen. Zu negative Werte können den Effekt deaktivieren. Gemischte positive und negative Werte können ungewöhnliches Leuchten erzeugen, z. B. (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Wählt das Overlay-Muster des Supporter Upgrade DLC. Dies ist nur sichtbar, wenn der Supporter Upgrade DLC installiert ist. Das Muster ist additiv, daher muss die Farbe heller als Schwarz sein, um sichtbar zu werden.
  livery_gui_slider_primaryx_text: |-
    Steuert die Reaktion von matt zu glänzend für die stumpferen Bereiche des Materials Hauptfarbe. Niedrige Werte wirken flacher und lackierter; höhere Werte erzeugen schärfere Lichtreflexe. Werte nahe 1 wirken fast spiegelnd.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primaryy_text: |-
    Steuert die Reaktion von matt zu glänzend für die mittleren Bereiche des Materials Hauptfarbe. Höhere Werte erzeugen schärfere Lichtreflexe. Werte nahe 1 wirken fast spiegelnd.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primaryz_text: |-
    Steuert die Reaktion von matt zu glänzend für die hellsten oder am stärksten polierten Bereiche des Materials Hauptfarbe. Höhere Werte erzeugen schärfere Lichtreflexe. Werte nahe 1 wirken fast spiegelnd.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_primaryw_text: |-
    Steuert die Metallwirkung des Materials Hauptfarbe. Um 0 verhält es sich eher wie Lack oder Kunststoff: Der Winkel des Materials beeinflusst das Aussehen nicht. Um 1 verhält es sich eher wie Metall: Der Winkel beeinflusst das Aussehen dieses Materialbereichs. Werte außerhalb 0 bis 1 sind experimentell. Negative Werte scheinen zu leuchten, und große positive Werte beeinflussen die Helligkeit glatter Glanzlichter und können exotische Farbeffekte erzeugen, besonders mit gemischten RGB-Werten wie (R,G,B)=(1.2, 0.5, 0.8) oder (1.2, 0.4, 1.2).
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen. Bei großen W-Werten X,Y,Z-Glanz reduzieren, um das zu vermeiden.
  livery_gui_slider_secondaryx_text: |-
