  livery_gui_slider_effectx_text: |-
    Steuert das Schillern der Hauptfarbe-Lackbereiche. Positive Werte verstärken eher regenbogenartige Irideszenz. Negative Werte wirken eher perlmuttartig. Werte nahe 0 haben wenig oder keinen Effekt. Große positive oder negative Werte wirken ungewöhnlich. Metallwirkung und die R,G,B-Farbe des Teils beeinflussen das Ergebnis.
    
    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_effecty_text: |-
