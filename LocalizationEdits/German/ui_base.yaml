edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Erweiterte Optionen zur Lackierungsanpassung anzeigen/ausblenden
  livery_gui_pilot_mode_toggle_header: |-
    Piloten-Lackierungsset-Bearbeitung umschalten
  livery_gui_pilot_mode_toggle_text: |-
    In diesem Modus bearbeitest du das Lackierungsset des ausgewählten Piloten, indem du den Mech-Teilen Lackierungen zuweist. Mech-Teile ohne Piloten-Lackierung sind transparent und zeigen die Lackierung des Mechs. Beispiel: Du kannst einen Mech im Mech-Modus grau lackieren, dann den Pilotenmodus aktivieren und dem Oberkörper eine rote Lackierung zuweisen. Wenn dieser Pilot diesen Mech steuert, ist der Mech grau mit rotem Oberkörper. Jeder Mech, dem dieser Pilot zugewiesen wird, erhält einen roten Oberkörper.
  livery_gui_pilot_mode_base_toggle_header: |-
    Mech-Lackierung anzeigen/ausblenden
  livery_gui_pilot_mode_base_toggle_text: |-
    Zeigt oder verbirgt die Basislackierung des Mechs unter der Piloten-Lackierung. Das betrifft nur die Ansicht in diesem Editor. Rechtsklicke auf Lackierungsplätze, um die Piloten-Lackierung von diesem Platz zu entfernen. Hinweis: Eine Lackierung auf einem Platz mit + betrifft auch alle darin enthaltenen Teile.
  livery_gui_previous_pilot_header: |-
    Vorheriger Pilot
  livery_gui_previous_pilot_text: |-
    Wählt den vorherigen Piloten. Dies bestimmt, welches Piloten-Lackierungsset im Piloten-Lackierungsmodus bearbeitet wird. Dadurch wird der Pilot nicht dem Mech zugewiesen; Piloten werden im Missionsbriefing zugewiesen.
  livery_gui_next_pilot_header: |-
    Nächster Pilot
  livery_gui_next_pilot_text: |-
    Wählt den nächsten Piloten. Dies bestimmt, welches Piloten-Lackierungsset im Piloten-Lackierungsmodus bearbeitet wird. Dadurch wird der Pilot nicht dem Mech zugewiesen; Piloten werden im Missionsbriefing zugewiesen.
  livery_gui_reset_button_header: |-
    Änderungen zurücksetzen
  livery_gui_reset_button_text: |-
    Setzt diese Lackierung auf die zuletzt gespeicherten Werte zurück.
  livery_gui_save_button_header: |-
    Lackierung speichern
  livery_gui_save_button_text: |-
    Speichert diese Lackierung unter dem angegebenen Namen. Der Name darf keiner eingebauten Lackierung und keiner von einem Mod bereitgestellten Lackierung entsprechen. Ein neuer Name speichert eine neue Lackierung mit diesem Namen.
  livery_gui_favorite_button_header: |-
    Favorit umschalten
  livery_gui_favorite_button_text: |-
    Markiert diese Lackierung als Favorit. Favoriten bleiben am Anfang der Lackierungsliste.
  livery_gui_hints_header: |-
    Hinweise
  livery_gui_hints_basic_text: |-
    Klicke auf Schieberegler oder klicke und ziehe zum Einstellen.
    
    Speichern nicht vergessen.
    Normale Werte liegen zwischen 0 und 1. Andere Werte können funktionieren, aber Probleme verursachen.
    
    Du kannst die Tastaturbefehle Kamera bewegen (hoch/runter/links/rechts) verwenden, um die Ansicht anzupassen.
  livery_gui_hints_precise_left_text: |-
    Für präzise Anpassungen:
    Rechtsklick halten und Maus nach links/rechts bewegen.
    Geschwindigkeit ändern: SHIFT, ALT oder CTRL halten.
  livery_gui_hints_precise_drag_text: |-
    Für präzise Anpassungen:
    Rechtsklick halten und Maus nach links/rechts bewegen.
    Geschwindigkeit ändern: SHIFT, ALT oder CTRL halten.
  livery_gui_pilot_livery_slot_marker_header: |-
    Piloten-Lackierung
  livery_gui_pilot_livery_slot_marker_text: |-
    Das eigene Lackierungsset des Piloten wird auf diesen Platz angewendet. Diese Lackierung wird auf jedem von diesem Piloten gesteuerten Mech auf diesen Platz angewendet. Hinweis: Jeder mit + markierte Platz hat Unterplätze, die vom übergeordneten Platz beeinflusst werden.
  livery_gui_mech_livery_slot_marker_header: |-
    Mech-Basislackierung
  livery_gui_mech_livery_slot_marker_text: |-
    Diesem Platz wurde keine Piloten-Lackierung zugewiesen. Die Basislackierung des Mechs steuert diesen Platz. Eine hier zugewiesene Lackierung wird dem Piloten-Lackierungsset hinzugefügt.
  livery_gui_livery_name_input: |-
    Lackierungsname
  livery_gui_pilot_none: |-
    [keine]
  livery_gui_supporter_pattern_none: |-
    keine (w=0.0)
  livery_gui_supporter_pattern_dots: |-
    Punkte (w=1.0)
  livery_gui_supporter_pattern_lines: |-
    Linien (w=2.0)
  livery_gui_supporter_pattern_sheen: |-
