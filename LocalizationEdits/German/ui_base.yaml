    Extrem helle Teile können besonders bei hohem Glanz schwere Grafikfehler verursachen.
  livery_gui_slider_effectw_text: |-
    Reservierter Effektwert. Er scheint derzeit keinen sichtbaren Effekt zu haben, wird aber der Vollständigkeit und zum Experimentieren gespeichert.
