  livery_gui_slider_contentx_text: |-
    Legt den Rot-Anteil für das Overlay-Muster des Supporter Upgrade DLC fest. Dies ist nur sichtbar, wenn der Supporter Upgrade DLC installiert ist und ein anderes Muster als keine gewählt ist (Supporter DLC W).
    
    Die Werte sind additiv und können helles Leuchten oder Bloom erzeugen. Zu negative Werte können den Effekt deaktivieren. Gemischte positive und negative Werte können ungewöhnliches Leuchten erzeugen, z. B. (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Legt den Grün-Anteil für das Overlay-Muster des Supporter Upgrade DLC fest. Dies ist nur sichtbar, wenn der Supporter Upgrade DLC installiert ist und ein anderes Muster als keine gewählt ist (Supporter DLC W).
    
    Die Werte sind additiv und können helles Leuchten oder Bloom erzeugen. Zu negative Werte können den Effekt deaktivieren. Gemischte positive und negative Werte können ungewöhnliches Leuchten erzeugen, z. B. (R,G,B)=(+5, -5, -1.8)
