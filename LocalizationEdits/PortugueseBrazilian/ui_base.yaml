edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Mostra/oculta opções avançadas de personalização de pinturas
  livery_gui_pilot_mode_toggle_header: |-
    Alternar modo de edição de pinturas de mekanauta
  livery_gui_pilot_mode_toggle_text: |-
    Neste modo, você edita o conjunto de pinturas do mekanauta selecionado atribuindo pinturas às peças do meka. Peças sem pintura de mekanauta são transparentes e mostram a pintura do próprio meka. Por exemplo, você pode pintar um meka de cinza no modo de edição do meka, ativar o modo de mekanauta e atribuir uma pintura vermelha à parte superior do corpo. Quando esse mekanauta pilotar esse meka, o meka ficará cinza com a parte superior vermelha. Qualquer meka atribuído a esse mekanauta terá a parte superior vermelha.
  livery_gui_pilot_mode_base_toggle_header: |-
    Mostrar/ocultar pintura do meka
  livery_gui_pilot_mode_base_toggle_text: |-
    Mostra ou oculta a pintura base do meka abaixo da pintura do mekanauta. Isso só afeta a visualização neste editor. Clique com o botão direito nos espaços de pintura para remover a pintura do mekanauta desse espaço. Observação: atribuir uma pintura a um espaço com + também afeta todas as peças contidas nesse espaço.
  livery_gui_previous_pilot_header: |-
    Mekanauta anterior
  livery_gui_previous_pilot_text: |-
    Seleciona o mekanauta anterior. Isso controla qual conjunto de pinturas de mekanauta está sendo editado no modo de edição de pinturas de mekanauta. Isso não atribui o mekanauta ao meka; a atribuição é feita no briefing da missão.
  livery_gui_next_pilot_header: |-
    Próximo mekanauta
  livery_gui_next_pilot_text: |-
    Seleciona o próximo mekanauta. Isso controla qual conjunto de pinturas de mekanauta está sendo editado no modo de edição de pinturas de mekanauta. Isso não atribui o mekanauta ao meka; a atribuição é feita no briefing da missão.
  livery_gui_reset_button_header: |-
    Reverter alterações
  livery_gui_reset_button_text: |-
    Restaura esta pintura para os últimos valores salvos.
  livery_gui_save_button_header: |-
    Salvar pintura
  livery_gui_save_button_text: |-
    Salva esta pintura usando o nome informado. O nome não deve corresponder a uma pintura integrada nem a uma pintura fornecida por um mod. Usar um nome novo salvará uma nova pintura com esse nome.
  livery_gui_favorite_button_header: |-
    Alternar favorito
  livery_gui_favorite_button_text: |-
    Marca esta pintura como favorita. Favoritas ficam no início da lista de pinturas.
  livery_gui_hints_header: |-
    Dicas
  livery_gui_hints_basic_text: |-
    Clique nos controles deslizantes ou clique e arraste para ajustar.
    
    Lembre-se de salvar.
    Os valores normais dos controles ficam entre 0 e 1. Outros valores podem funcionar, mas podem causar problemas.
    
    Você pode usar as teclas de Mover câmera (cima/baixo/esquerda/direita) para ajustar a visão.
  livery_gui_hints_precise_left_text: |-
    Para ajustes precisos:
    segure o botão direito e mova o mouse para esquerda/direita.
    Alterar velocidade: segure SHIFT, ALT ou CTRL.
  livery_gui_hints_precise_drag_text: |-
    Para ajustes precisos:
    segure o botão direito e mova o mouse para esquerda/direita.
    Alterar velocidade: segure SHIFT, ALT ou CTRL.
  livery_gui_pilot_livery_slot_marker_header: |-
    Pintura do mekanauta
  livery_gui_pilot_livery_slot_marker_text: |-
    O conjunto de pinturas do próprio mekanauta é aplicado a este espaço. Esta pintura será aplicada a este espaço em qualquer meka pilotado por esse mekanauta. Observação: qualquer espaço marcado com + tem espaços filhos que serão afetados pelo espaço pai.
  livery_gui_mech_livery_slot_marker_header: |-
    Pintura base do meka
  livery_gui_mech_livery_slot_marker_text: |-
    Nenhuma pintura de mekanauta foi atribuída a este espaço. A pintura base do meka controlará este espaço. Atribuir uma pintura aqui a adicionará ao conjunto de pinturas do mekanauta.
  livery_gui_livery_name_input: |-
    Nome da pintura
  livery_gui_pilot_none: |-
