  livery_gui_slider_effectx_text: |-
    Controla a iridescência das áreas de pintura principal. Valores positivos tendem a uma iridescência de arco-íris mais forte. Valores negativos tendem a um visual perolado. Valores perto de 0 têm pouco ou nenhum efeito. Valores grandes, positivos ou negativos, parecerão incomuns. O aspecto metálico e a cor R,G,B da peça afetam o resultado.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_effecty_text: |-
    Controla a iridescência das áreas de pintura secundária. Valores positivos tendem a uma iridescência de arco-íris mais forte. Valores negativos tendem a um visual perolado. Valores perto de 0 têm pouco ou nenhum efeito. Valores grandes, positivos ou negativos, parecerão incomuns. O aspecto metálico e a cor R,G,B da peça afetam o resultado.
    
