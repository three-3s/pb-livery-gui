  livery_gui_slider_primaryr_text: |-
    Define a quantidade de vermelho para as áreas principal da pintura.
    
    as áreas principal, secundária e terceira são áreas diferentes em cada peça do meka. Valores normais de cor geralmente vão de 0 a 1. Valores acima de 1 podem deixar as cores mais brilhantes.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primaryg_text: |-
    Define a quantidade de verde para as áreas principal da pintura.
    
    as áreas principal, secundária e terceira são áreas diferentes em cada peça do meka. Valores normais de cor geralmente vão de 0 a 1. Valores acima de 1 podem deixar as cores mais brilhantes.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primaryb_text: |-
    Define a quantidade de azul para as áreas principal da pintura.
    
    as áreas principal, secundária e terceira são áreas diferentes em cada peça do meka. Valores normais de cor geralmente vão de 0 a 1. Valores acima de 1 podem deixar as cores mais brilhantes.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primarya_text: |-
    Ajusta a força com que a cor principal é aplicada. Perto de 1 é a aparência normal. Valores menores ou negativos tendem a clarear ou lavar a cor em direção ao branco; valores maiores a escurecem em direção ao preto, com uma interação especial com cores mais brilhantes que 1.
    
    Isto se comporta mais como controle de brilho/contraste do que transparência comum, e valores extremos podem produzir resultados incomuns.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
