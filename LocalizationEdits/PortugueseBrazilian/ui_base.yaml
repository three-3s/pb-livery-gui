  livery_gui_slider_contentx_text: |-
    Define a quantidade de vermelho para o padrão sobreposto do Supporter Upgrade DLC. Só tem efeito visível se o Supporter Upgrade DLC estiver instalado e um padrão diferente de nenhum for selecionado (configuração Supporter DLC W).
    
    Os valores são aditivos e podem criar brilho forte ou bloom. Valores negativos demais podem desativar o efeito. Misturar valores positivos e negativos pode produzir brilho incomum, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Define a quantidade de verde para o padrão sobreposto do Supporter Upgrade DLC. Só tem efeito visível se o Supporter Upgrade DLC estiver instalado e um padrão diferente de nenhum for selecionado (configuração Supporter DLC W).
    
    Os valores são aditivos e podem criar brilho forte ou bloom. Valores negativos demais podem desativar o efeito. Misturar valores positivos e negativos pode produzir brilho incomum, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
    Define a quantidade de azul para o padrão sobreposto do Supporter Upgrade DLC. Só tem efeito visível se o Supporter Upgrade DLC estiver instalado e um padrão diferente de nenhum for selecionado (configuração Supporter DLC W).
    
    Os valores são aditivos e podem criar brilho forte ou bloom. Valores negativos demais podem desativar o efeito. Misturar valores positivos e negativos pode produzir brilho incomum, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Escolhe o padrão sobreposto do Supporter Upgrade DLC. Só tem efeito visível se o Supporter Upgrade DLC estiver instalado. O padrão é aditivo, então a cor precisa ser mais brilhante que preto para aparecer.
  livery_gui_slider_primaryx_text: |-
    Controla a resposta de fosco para brilhante nas regiões mais opacas do material principal. Valores baixos parecem mais planos e pintados; valores maiores produzem reflexos mais nítidos. Valores perto de 1 são quase espelhados.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primaryy_text: |-
    Controla a resposta de fosco para brilhante nas regiões médias do material principal. Valores maiores produzem reflexos mais nítidos. Valores perto de 1 são quase espelhados.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primaryz_text: |-
    Controla a resposta de fosco para brilhante nas regiões mais claras ou polidas do material principal. Valores maiores produzem reflexos mais nítidos. Valores perto de 1 são quase espelhados.
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais.
  livery_gui_slider_primaryw_text: |-
    Controla o aspecto metálico do material principal. Perto de 0 se comporta mais como tinta ou plástico: o ângulo do material não afeta sua aparência. Perto de 1 se comporta mais como metal: o ângulo do material afeta a aparência daquela parte. Valores fora de 0 a 1 são experimentais. Valores negativos parecem brilhar, e valores positivos grandes afetam a luminosidade dos reflexos suaves e podem causar efeitos de cor exóticos, especialmente com valores RGB mistos como (R,G,B)=(1.2, 0.5, 0.8) ou (1.2, 0.4, 1.2).
    
    Peças extremamente brilhantes, especialmente com muito brilho, podem causar grandes erros visuais. Ao usar valores W grandes, reduza o brilho X,Y,Z para ajudar a evitar isso.
  livery_gui_slider_secondaryx_text: |-
    Controla a resposta de fosco para brilhante nas regiões mais opacas do material secundária. Valores baixos parecem mais planos e pintados; valores maiores produzem reflexos mais nítidos. Valores perto de 1 são quase espelhados.
    
