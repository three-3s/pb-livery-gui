  livery_gui_slider_contentx_text: |-
    Ajusta la cantidad de rojo del patrón superpuesto del Supporter Upgrade DLC. Solo tiene efecto visible si el Supporter Upgrade DLC está instalado y se selecciona un patrón que no sea “ninguno” (ajuste Supporter DLC W).
    
    Los valores son aditivos y pueden crear resplandor o bloom brillante. Los valores demasiado negativos pueden desactivar el efecto. Mezclar valores positivos y negativos puede producir resplandores inusuales, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Ajusta la cantidad de verde del patrón superpuesto del Supporter Upgrade DLC. Solo tiene efecto visible si el Supporter Upgrade DLC está instalado y se selecciona un patrón que no sea “ninguno” (ajuste Supporter DLC W).
    
    Los valores son aditivos y pueden crear resplandor o bloom brillante. Los valores demasiado negativos pueden desactivar el efecto. Mezclar valores positivos y negativos puede producir resplandores inusuales, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
