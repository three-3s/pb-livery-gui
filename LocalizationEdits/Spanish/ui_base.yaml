  livery_gui_slider_primaryr_text: |-
    Ajusta la cantidad de rojo para las zonas principal de la pintura.
    
    las zonas principales, secundarias y terciarias son zonas distintas de cada pieza del meca. Los valores normales de color suelen ir de 0 a 1. Los valores superiores a 1 pueden hacer los colores más brillantes.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primaryg_text: |-
    Ajusta la cantidad de verde para las zonas principal de la pintura.
    
    las zonas principales, secundarias y terciarias son zonas distintas de cada pieza del meca. Los valores normales de color suelen ir de 0 a 1. Los valores superiores a 1 pueden hacer los colores más brillantes.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primaryb_text: |-
    Ajusta la cantidad de azul para las zonas principal de la pintura.
    
    las zonas principales, secundarias y terciarias son zonas distintas de cada pieza del meca. Los valores normales de color suelen ir de 0 a 1. Los valores superiores a 1 pueden hacer los colores más brillantes.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primarya_text: |-
    Ajusta la fuerza con la que se aplica el color principal. Cerca de 1 es el aspecto normal. Los valores más bajos o negativos tienden a aclarar o lavar el color hacia blanco; los valores más altos lo oscurecen hacia negro, con una interacción especial con colores más brillantes que 1.
    
    Se comporta más como un control de brillo/contraste que como transparencia normal, y los valores extremos pueden dar resultados inusuales.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_secondaryr_text: |-
    Ajusta la cantidad de rojo para las zonas secundaria de la pintura.
    
    las zonas principales, secundarias y terciarias son zonas distintas de cada pieza del meca. Los valores normales de color suelen ir de 0 a 1. Los valores superiores a 1 pueden hacer los colores más brillantes.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
