  livery_gui_slider_effectx_text: |-
    Controla la “iridiscencia” de las zonas de pintura principal. Los valores positivos tienden a una iridiscencia arcoíris más fuerte. Los valores negativos tienden a un aspecto nacarado. Los valores cerca de 0 tienen poco o ningún efecto. Los valores grandes, positivos o negativos, se verán “inusuales”. El “aspecto metálico” y el color R,G,B de la pieza afectan el resultado.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_effecty_text: |-
    Controla la “iridiscencia” de las zonas de pintura secundaria. Los valores positivos tienden a una iridiscencia arcoíris más fuerte. Los valores negativos tienden a un aspecto nacarado. Los valores cerca de 0 tienen poco o ningún efecto. Los valores grandes, positivos o negativos, se verán “inusuales”. El “aspecto metálico” y el color R,G,B de la pieza afectan el resultado.
    
