    Los valores son aditivos y pueden crear resplandor o bloom brillante. Los valores demasiado negativos pueden desactivar el efecto. Mezclar valores positivos y negativos puede producir resplandores inusuales, como (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Elige el patrón superpuesto del Supporter Upgrade DLC. Solo tiene efecto visible si el Supporter Upgrade DLC está instalado. El patrón es “aditivo”, así que el color debe ser más brillante que el negro para verse.
  livery_gui_slider_primaryx_text: |-
    Controla la respuesta de mate a brillante en las regiones más apagadas del material principal. Los valores bajos se ven más planos y pintados; los valores altos producen reflejos más definidos. Los valores cercanos a 1 son casi como un espejo.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primaryy_text: |-
    Controla la respuesta de mate a brillante en las regiones medias del material principal (zonas que no son ni las más apagadas ni las más lisas). Los valores altos producen reflejos más definidos. Los valores cercanos a 1 son casi como un espejo.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primaryz_text: |-
    Controla la respuesta de mate a brillante en las regiones más luminosas o pulidas del material principal. Los valores altos producen reflejos más definidos. Los valores cercanos a 1 son casi como un espejo.
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves.
  livery_gui_slider_primaryw_text: |-
    Controla el “aspecto metálico” del material principal. Cerca de 0 se comporta más como pintura o plástico: el ángulo del material no afecta su aspecto. Cerca de 1 se comporta más como metal: el ángulo del material sí afecta el aspecto de esa parte. Los valores fuera de 0 a 1 son experimentales. Los valores negativos parecen “brillar”, y los valores positivos grandes afectan el brillo de los reflejos suaves y pueden causar efectos de color exóticos, sobre todo con valores RGB mezclados como (R,G,B)=(1.2, 0.5, 0.8) o (1.2, 0.4, 1.2).
    
    Las piezas extremadamente brillantes, sobre todo si tienen mucho brillo, pueden causar errores visuales graves. Al usar valores W grandes, baja el brillo X,Y,Z para ayudar a evitarlo.
  livery_gui_slider_secondaryx_text: |-
    Controla la respuesta de mate a brillante en las regiones más apagadas del material secundaria. Los valores bajos se ven más planos y pintados; los valores altos producen reflejos más definidos. Los valores cercanos a 1 son casi como un espejo.
    
