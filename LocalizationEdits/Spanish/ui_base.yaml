edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Mostrar/ocultar opciones avanzadas de personalización de pinturas
  livery_gui_pilot_mode_toggle_header: |-
    Alternar modo de edición de pinturas de piloto
  livery_gui_pilot_mode_toggle_text: |-
    En este modo, editas el conjunto de pinturas del piloto seleccionado asignando pinturas a las piezas del meca. Las piezas sin pintura de piloto son transparentes y muestran la pintura del meca. Por ejemplo, puedes pintar un meca de gris en modo de edición del meca, activar el modo de piloto y asignar una pintura roja al torso superior. Cuando ese piloto maneje ese meca, el meca será gris con el torso superior rojo. Cualquier meca asignado a ese piloto tendrá el torso superior rojo.
  livery_gui_pilot_mode_base_toggle_header: |-
    Mostrar/ocultar pintura del meca
  livery_gui_pilot_mode_base_toggle_text: |-
    Muestra u oculta la pintura base del meca debajo de la pintura del piloto. Solo afecta a la vista de este editor. Haz clic derecho en los espacios de pintura para quitar la pintura del piloto de ese espacio. Nota: asignar una pintura a un espacio con “+” también afecta a todas las piezas contenidas en ese espacio.
  livery_gui_previous_pilot_header: |-
    Piloto anterior
  livery_gui_previous_pilot_text: |-
    Selecciona el piloto anterior. Esto controla qué conjunto de pinturas de piloto se edita en el modo de edición de pinturas de piloto. No asigna el piloto al meca; eso se hace en las instrucciones de la misión.
  livery_gui_next_pilot_header: |-
    Piloto siguiente
  livery_gui_next_pilot_text: |-
    Selecciona el piloto siguiente. Esto controla qué conjunto de pinturas de piloto se edita en el modo de edición de pinturas de piloto. No asigna el piloto al meca; eso se hace en las instrucciones de la misión.
  livery_gui_reset_button_header: |-
    Revertir cambios
  livery_gui_reset_button_text: |-
    Restablece esta pintura a sus últimos valores guardados.
  livery_gui_save_button_header: |-
    Guardar pintura
  livery_gui_save_button_text: |-
    Guarda esta pintura con el nombre indicado. El nombre no debe coincidir con ninguna pintura integrada ni con una pintura proporcionada por otro mod. Usar un nombre nuevo guardará una pintura nueva con ese nombre.
  livery_gui_favorite_button_header: |-
    Marcar/desmarcar favorito
  livery_gui_favorite_button_text: |-
    Marca esta pintura como favorita. Las favoritas se mantienen al principio de la lista de pinturas.
  livery_gui_hints_header: |-
    Consejos
  livery_gui_hints_basic_text: |-
    Haz clic en los controles deslizantes o haz clic y arrastra para ajustar.
    
    Recuerda guardar.
    Los valores normales de los controles están entre 0 y 1. Otros valores pueden funcionar, pero también pueden causar problemas.
    
    Puedes usar las teclas de “Mover cámara” (arriba/abajo/izquierda/derecha) para ajustar la vista.
  livery_gui_hints_precise_left_text: |-
    Para ajustes precisos:
    mantén clic derecho y mueve el ratón <–––>.
    Cambiar velocidad: mantén SHIFT, ALT o CTRL.
  livery_gui_hints_precise_drag_text: |-
    Para ajustes precisos:
    mantén clic derecho y mueve el ratón <–––>.
    Cambiar velocidad: mantén SHIFT, ALT o CTRL.
  livery_gui_pilot_livery_slot_marker_header: |-
    Pintura del piloto
  livery_gui_pilot_livery_slot_marker_text: |-
    El conjunto de pinturas propio del piloto se aplica a este espacio. Esta pintura se aplicará al mismo espacio de cualquier meca pilotado por este piloto. Nota: cualquier espacio marcado con “+” tiene espacios secundarios que se verán afectados por el espacio padre.
  livery_gui_mech_livery_slot_marker_header: |-
    Pintura base del meca
  livery_gui_mech_livery_slot_marker_text: |-
    No se ha asignado pintura de piloto a este espacio. La pintura base del meca controlará este espacio. Asignar una pintura aquí la asignará al conjunto de pinturas del piloto.
  livery_gui_livery_name_input: |-
    Nombre de pintura
  livery_gui_pilot_none: |-
    [ninguno]
  livery_gui_supporter_pattern_none: |-
