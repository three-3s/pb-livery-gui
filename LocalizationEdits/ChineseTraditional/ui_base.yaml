    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_secondaryw_text: |-
    控制副色材質的“金屬感”。约为0时更像涂漆或塑膠：材質角度不会影響外观。约为1时更像金属：材質角度会影響该區域的外观。0到1之外的值属于實驗性质。负值似乎会“發光”，较大的正值会影響平滑高光的亮度，并可能造成特殊顏色效果，尤其在混合 RGB 值如 (R,G,B)=(1.2, 0.5, 0.8) 或 (1.2, 0.4, 1.2) 时。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。使用较大的 W 值时，请降低 X,Y,Z 光澤度以帮助避免问题。
  livery_gui_slider_tertiaryx_text: |-
