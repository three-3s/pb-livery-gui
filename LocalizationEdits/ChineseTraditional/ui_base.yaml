  livery_gui_slider_tertiarya_text: |-
    調整第三色套用的強度。约为1时是正常外观。較低或负數值通常会让顏色变亮或偏向白色；較高數值会让顏色变暗趋向黑色，并且会与大于1的亮色產生特殊互动。
    
    它更像亮度/对比度控制，而不是一般透明度；极端值可能產生異常结果。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_contentx_text: |-
    設定 Supporter Upgrade DLC 疊加圖案的紅色量。只有安裝了 Supporter Upgrade DLC 且選擇了“無”以外的圖案（Supporter DLC W 設定）时才可見。
    
    这些值是加性的，可以產生明亮輝光或泛光。过于负的值可能停用效果。混合正值和负值可能產生異常輝光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    設定 Supporter Upgrade DLC 疊加圖案的綠色量。只有安裝了 Supporter Upgrade DLC 且選擇了“無”以外的圖案（Supporter DLC W 設定）时才可見。
    
    这些值是加性的，可以產生明亮輝光或泛光。过于负的值可能停用效果。混合正值和负值可能產生異常輝光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentz_text: |-
    設定 Supporter Upgrade DLC 疊加圖案的藍色量。只有安裝了 Supporter Upgrade DLC 且選擇了“無”以外的圖案（Supporter DLC W 設定）时才可見。
    
    这些值是加性的，可以產生明亮輝光或泛光。过于负的值可能停用效果。混合正值和负值可能產生異常輝光，例如 (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    選擇 Supporter Upgrade DLC 疊加圖案。只有安裝了 Supporter Upgrade DLC 时才可見。该圖案是“加性”的，因此顏色必须比黑色更亮才可見。
  livery_gui_slider_primaryx_text: |-
    控制主色材質较暗區域从霧面到高光的反应。較低值看起来更平、更像涂漆；較高值会產生更锐利的反光高光。接近1的值几乎像鏡面。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primaryy_text: |-
    控制主色材質中间區域（既不是“最暗”也不是“最光滑”的區域）从霧面到高光的反应。較高值会產生更锐利的反光高光。接近1的值几乎像鏡面。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primaryz_text: |-
    控制主色材質最亮或最拋光區域从霧面到高光的反应。較高值会產生更锐利的反光高光。接近1的值几乎像鏡面。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primaryw_text: |-
    控制主色材質的“金屬感”。约为0时更像涂漆或塑膠：材質角度不会影響外观。约为1时更像金属：材質角度会影響该區域的外观。0到1之外的值属于實驗性质。负值似乎会“發光”，较大的正值会影響平滑高光的亮度，并可能造成特殊顏色效果，尤其在混合 RGB 值如 (R,G,B)=(1.2, 0.5, 0.8) 或 (1.2, 0.4, 1.2) 时。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。使用较大的 W 值时，请降低 X,Y,Z 光澤度以帮助避免问题。
  livery_gui_slider_secondaryx_text: |-
    控制副色材質较暗區域从霧面到高光的反应。較低值看起来更平、更像涂漆；較高值会產生更锐利的反光高光。接近1的值几乎像鏡面。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_secondaryy_text: |-
