  livery_gui_slider_primaryr_text: |-
    設定塗裝主色區域的紅色量。
    
    主色、副色和第三色是每个機甲部件上的不同區域。一般顏色值通常为0到1。大于1的值可以让顏色更亮。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primaryg_text: |-
    設定塗裝主色區域的綠色量。
    
    主色、副色和第三色是每个機甲部件上的不同區域。一般顏色值通常为0到1。大于1的值可以让顏色更亮。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primaryb_text: |-
    設定塗裝主色區域的藍色量。
    
    主色、副色和第三色是每个機甲部件上的不同區域。一般顏色值通常为0到1。大于1的值可以让顏色更亮。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_primarya_text: |-
    調整主色套用的強度。约为1时是正常外观。較低或负數值通常会让顏色变亮或偏向白色；較高數值会让顏色变暗趋向黑色，并且会与大于1的亮色產生特殊互动。
    
    它更像亮度/对比度控制，而不是一般透明度；极端值可能產生異常结果。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_secondaryr_text: |-
    設定塗裝副色區域的紅色量。
    
    主色、副色和第三色是每个機甲部件上的不同區域。一般顏色值通常为0到1。大于1的值可以让顏色更亮。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_secondaryg_text: |-
