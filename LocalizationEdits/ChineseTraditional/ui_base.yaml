  livery_gui_slider_effectx_text: |-
    控制主色涂漆區域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“異常”。“金屬感”和部件的 R,G,B 顏色会影響其外观。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_effecty_text: |-
    控制副色涂漆區域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“異常”。“金屬感”和部件的 R,G,B 顏色会影響其外观。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_effectz_text: |-
    控制第三色涂漆區域的“虹色效果”。正值通常会增强彩虹般的虹彩。负值通常更接近珠光效果。接近0时几乎没有效果。较大的正值或负值都会显得“異常”。“金屬感”和部件的 R,G,B 顏色会影響其外观。
    
    过亮的部件，尤其在高光澤时，可能造成嚴重視覺錯誤。
  livery_gui_slider_effectw_text: |-
    保留的效果值。目前似乎没有可見效果，但仍会儲存以便完整性和實驗。
