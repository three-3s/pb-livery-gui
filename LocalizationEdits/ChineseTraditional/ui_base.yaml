  livery_gui_slider_tertiaryw_text: |-
    控制第三色材質的“金屬感”。约为0时更像涂漆或塑膠：材質角度不会影響外观。约为1时更像金属：材質角度会影響该區域的外观。0到1之外的值属于實驗性质。负值似乎会“發光”，较大的正值会影響平滑高光的亮度，并可能造成特殊顏色效果，尤其在混合 RGB 值如 (R,G,B)=(1.2, 0.5, 0.8) 或 (1.2, 0.4, 1.2) 时。
    
