  livery_gui_slider_effectx_text: |-
    Controle iridescence des zones de peinture principale. Les valeurs positives tendent vers une iridescence arc-en-ciel plus forte. Les valeurs negatives tendent vers un aspect nacre. Les valeurs proches de 0 ont peu ou pas effet. Les grandes valeurs, positives ou negatives, auront un rendu inhabituel. Aspect metallique et la couleur R,G,B de la piece influencent le resultat.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
