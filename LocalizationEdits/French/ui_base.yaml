edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    Afficher ou masquer les options avancees de personnalisation des peintures
  livery_gui_pilot_mode_toggle_header: |-
    Basculer en edition des peintures de pilote
  livery_gui_pilot_mode_toggle_text: |-
    Dans ce mode, vous modifiez le jeu de peintures du pilote selectionne en assignant des peintures aux pieces du mech. Les pieces sans peinture de pilote sont transparentes et affichent la peinture du mech. Par exemple, vous pouvez peindre un mech en gris en mode mech, puis activer le mode pilote et assigner une peinture rouge au haut du corps. Quand ce pilote controle ce mech, le mech sera gris avec un haut du corps rouge. Tout mech assigne a ce pilote aura un haut du corps rouge.
  livery_gui_pilot_mode_base_toggle_header: |-
    Afficher ou masquer la peinture du mech
  livery_gui_pilot_mode_base_toggle_text: |-
    Affiche ou masque la peinture de base du mech sous la peinture du pilote. Seul affichage dans cet editeur est affecte. Faites un clic droit sur les emplacements de peinture pour retirer la peinture du pilote de cet emplacement. Remarque : assigner une peinture a un emplacement avec un + affecte aussi toutes les pieces contenues dans cet emplacement.
  livery_gui_previous_pilot_header: |-
    Pilote precedent
  livery_gui_previous_pilot_text: |-
    Selectionne le pilote precedent. Cela determine quel jeu de peintures de pilote est modifie en mode edition des peintures de pilote. Cela assigne pas le pilote au mech ; assignation se fait dans le briefing de mission.
  livery_gui_next_pilot_header: |-
    Pilote suivant
  livery_gui_next_pilot_text: |-
    Selectionne le pilote suivant. Cela determine quel jeu de peintures de pilote est modifie en mode edition des peintures de pilote. Cela assigne pas le pilote au mech ; assignation se fait dans le briefing de mission.
  livery_gui_reset_button_header: |-
    Annuler les changements
  livery_gui_reset_button_text: |-
    Reinitialise cette peinture a ses dernieres valeurs enregistrees.
  livery_gui_save_button_header: |-
    Enregistrer la peinture
  livery_gui_save_button_text: |-
    Enregistre cette peinture avec le nom indique. Le nom ne doit correspondre a aucune peinture integree ni fournie par un mod. Utiliser un nom inedit creera une nouvelle peinture avec ce nom.
  livery_gui_favorite_button_header: |-
    Ajouter ou retirer des favoris
  livery_gui_favorite_button_text: |-
    Marque cette peinture comme favorite. Les favorites restent au debut de la liste des peintures.
  livery_gui_hints_header: |-
    Astuces
  livery_gui_hints_basic_text: |-
    Cliquez sur les curseurs ou cliquez-glissez pour regler.
    
    Pensez a enregistrer.
    Les valeurs normales des curseurs sont entre 0 et 1. D autres valeurs peuvent fonctionner, mais elles peuvent provoquer des problemes.
    
    Vous pouvez utiliser les touches clavier Deplacer la camera (haut/bas/gauche/droite) pour ajuster la vue.
  livery_gui_hints_precise_left_text: |-
    Pour des reglages precis :
    maintenez le clic droit et deplacez la souris gauche-droite.
    Changer la vitesse : maintenez SHIFT, ALT ou CTRL.
  livery_gui_hints_precise_drag_text: |-
    Pour des reglages precis :
    maintenez le clic droit et deplacez la souris gauche-droite.
    Changer la vitesse : maintenez SHIFT, ALT ou CTRL.
  livery_gui_pilot_livery_slot_marker_header: |-
    Peinture de pilote
  livery_gui_pilot_livery_slot_marker_text: |-
    Le jeu de peintures propre au pilote est applique a cet emplacement. Cette peinture sera appliquee a cet emplacement sur tout mech pilote par ce pilote. Remarque : tout emplacement marque avec + possede des sous-emplacements qui seront affectes par emplacement parent.
  livery_gui_mech_livery_slot_marker_header: |-
    Peinture de base du mech
  livery_gui_mech_livery_slot_marker_text: |-
    Aucune peinture de pilote a ete assignee a cet emplacement. La peinture de base du mech controle cet emplacement. Assigner une peinture ici ajoutera cette peinture au jeu de peintures du pilote.
  livery_gui_livery_name_input: |-
    Nom de la peinture
  livery_gui_pilot_none: |-
    [aucun]
  livery_gui_supporter_pattern_none: |-
    aucun (w=0.0)
  livery_gui_supporter_pattern_dots: |-
    points (w=1.0)
  livery_gui_supporter_pattern_lines: |-
    lignes (w=2.0)
  livery_gui_supporter_pattern_sheen: |-
    reflet (w=3.0)
  livery_gui_message_load_failed: |-
    LiveryGUI : echec du chargement de {0} peintures. Consultez Player.log pour plus informations. [sp=s_text_24_exclamation]
  livery_gui_message_save_blocked_name: |-
