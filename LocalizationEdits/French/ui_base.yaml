  livery_gui_slider_primaryr_text: |-
    Regle la quantite de rouge pour les zones principale de la peinture.
    
    les zones principales, secondaires et troisiemes sont des zones differentes sur chaque piece du mech. Les valeurs de couleur normales sont generalement de 0 a 1. Les valeurs superieures a 1 peuvent rendre les couleurs plus lumineuses.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primaryg_text: |-
    Regle la quantite de vert pour les zones principale de la peinture.
    
    les zones principales, secondaires et troisiemes sont des zones differentes sur chaque piece du mech. Les valeurs de couleur normales sont generalement de 0 a 1. Les valeurs superieures a 1 peuvent rendre les couleurs plus lumineuses.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primaryb_text: |-
    Regle la quantite de bleu pour les zones principale de la peinture.
    
    les zones principales, secondaires et troisiemes sont des zones differentes sur chaque piece du mech. Les valeurs de couleur normales sont generalement de 0 a 1. Les valeurs superieures a 1 peuvent rendre les couleurs plus lumineuses.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primarya_text: |-
    Ajuste la force application de la couleur principale. Autour de 1, apparence est normale. Les valeurs plus basses ou negatives ont tendance a eclaircir ou delaver la couleur vers le blanc ; les valeurs plus elevees assombrissent vers le noir, avec une interaction particuliere avec les couleurs plus lumineuses que 1.
    
    Ce reglage ressemble davantage a un controle de luminosite/contraste que a une transparence ordinaire, et les valeurs extremes peuvent produire des resultats inhabituels.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
