  livery_gui_slider_contentx_text: |-
    Regle la quantite de rouge pour le motif superpose du Supporter Upgrade DLC. Cela a un effet visible seulement si le Supporter Upgrade DLC est installe et si un motif autre que aucun est selectionne (reglage Supporter DLC W).
    
    Les valeurs sont additives et peuvent creer une lueur vive ou du bloom. Des valeurs trop negatives peuvent desactiver effet. Melanger des valeurs positives et negatives peut produire une lueur inhabituelle, comme (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contenty_text: |-
    Regle la quantite de vert pour le motif superpose du Supporter Upgrade DLC. Cela a un effet visible seulement si le Supporter Upgrade DLC est installe et si un motif autre que aucun est selectionne (reglage Supporter DLC W).
    
    Les valeurs sont additives et peuvent creer une lueur vive ou du bloom. Des valeurs trop negatives peuvent desactiver effet. Melanger des valeurs positives et negatives peut produire une lueur inhabituelle, comme (R,G,B)=(+5, -5, -1.8)
