    Les valeurs sont additives et peuvent creer une lueur vive ou du bloom. Des valeurs trop negatives peuvent desactiver effet. Melanger des valeurs positives et negatives peut produire une lueur inhabituelle, comme (R,G,B)=(+5, -5, -1.8)
  livery_gui_slider_contentw_text: |-
    Choisit le motif superpose du Supporter Upgrade DLC. Cela a un effet visible seulement si le Supporter Upgrade DLC est installe. Le motif est additif, donc la couleur doit etre plus lumineuse que le noir pour etre visible.
  livery_gui_slider_primaryx_text: |-
    Controle la reaction mat-vers-brillant des regions les plus ternes du materiau principale. Les valeurs basses semblent plus plates et peintes ; les valeurs elevees produisent des reflets plus nets. Les valeurs proches de 1 sont presque comme un miroir.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primaryy_text: |-
    Controle la reaction mat-vers-brillant des regions moyennes du materiau principale. Les valeurs elevees produisent des reflets plus nets. Les valeurs proches de 1 sont presque comme un miroir.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primaryz_text: |-
    Controle la reaction mat-vers-brillant des regions les plus lumineuses ou polies du materiau principale. Les valeurs elevees produisent des reflets plus nets. Les valeurs proches de 1 sont presque comme un miroir.
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels.
  livery_gui_slider_primaryw_text: |-
    Controle aspect metallique du materiau principale. Autour de 0, il se comporte plutot comme de la peinture ou du plastique : angle du materiau affecte pas son apparence. Autour de 1, il se comporte davantage comme du metal : angle du materiau affecte apparence de cette partie. Les valeurs hors 0 a 1 sont experimentales. Les valeurs negatives semblent briller, et les grandes valeurs positives affectent la luminosite des reflets lisses et peuvent provoquer des effets de couleur exotiques, surtout avec des valeurs RGB melangees comme (R,G,B)=(1.2, 0.5, 0.8) ou (1.2, 0.4, 1.2).
    
    Les pieces tres lumineuses, surtout lorsque elles sont brillantes, peuvent provoquer de gros bugs visuels. Avec de grandes valeurs W, baissez la brillance X,Y,Z pour aider a eviter cela.
  livery_gui_slider_secondaryx_text: |-
