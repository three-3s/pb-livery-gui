  livery_gui_slider_primaryr_text: |-
    塗装のメイン領域の赤量を設定します。
    
    メイン、サブ、第3は各メカパーツ上の異なる領域です。通常の色の値は0から1です。1より大きい値は色を明るくできます。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primaryg_text: |-
    塗装のメイン領域の緑量を設定します。
    
    メイン、サブ、第3は各メカパーツ上の異なる領域です。通常の色の値は0から1です。1より大きい値は色を明るくできます。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primaryb_text: |-
    塗装のメイン領域の青量を設定します。
    
    メイン、サブ、第3は各メカパーツ上の異なる領域です。通常の色の値は0から1です。1より大きい値は色を明るくできます。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primarya_text: |-
    メイン色のかかり具合を調整します。1前後が通常の見た目です。低い値や負の値は色を白っぽく明るくし、高い値は黒く暗くします。1より明るい色とは独特に反応します。
    
    通常の透明度というより、明るさ/コントラスト調整に近い動作です。極端な値は変わった結果を生むことがあります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_secondaryr_text: |-
    塗装のサブ領域の赤量を設定します。
    
