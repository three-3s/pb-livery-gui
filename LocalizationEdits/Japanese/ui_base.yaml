edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    高度な塗装カスタマイズ項目の表示/非表示
  livery_gui_pilot_mode_toggle_header: |-
    パイロット塗装セット編集モード切替
  livery_gui_pilot_mode_toggle_text: |-
    このモードでは、選択中のパイロットの塗装セットを、メカの各パーツに塗装を割り当てて編集します。パイロット塗装がないメカパーツは透明扱いになり、メカ本体の塗装が表示されます。たとえば、メカ編集モードでメカを灰色に塗り、パイロット編集モードで上半身に赤い塗装を割り当てることができます。そのパイロットがそのメカに乗ると、メカは灰色で上半身だけ赤くなります。そのパイロットをどのメカに割り当てても、上半身は赤くなります。
  livery_gui_pilot_mode_base_toggle_header: |-
    メカ塗装の表示/非表示
  livery_gui_pilot_mode_base_toggle_text: |-
    パイロット塗装の下にあるメカ基本塗装を表示または非表示にします。このエディター内の見た目だけに影響します。塗装スロットを右クリックすると、そのスロットのパイロット塗装を解除できます。注意：「+」付きのスロットに塗装を割り当てると、その中に含まれる全パーツにも影響します。
  livery_gui_previous_pilot_header: |-
    前のパイロット
  livery_gui_previous_pilot_text: |-
    前のパイロットを選択します。パイロット塗装セット編集モードで、どのパイロットの塗装セットを編集するかを切り替えます。これはパイロットをメカに割り当てる操作ではありません。割り当てはミッションブリーフィングで行います。
  livery_gui_next_pilot_header: |-
    次のパイロット
  livery_gui_next_pilot_text: |-
    次のパイロットを選択します。パイロット塗装セット編集モードで、どのパイロットの塗装セットを編集するかを切り替えます。これはパイロットをメカに割り当てる操作ではありません。割り当てはミッションブリーフィングで行います。
  livery_gui_reset_button_header: |-
    変更を戻す
  livery_gui_reset_button_text: |-
    この塗装を最後に保存した値へ戻します。
  livery_gui_save_button_header: |-
    塗装を保存
  livery_gui_save_button_text: |-
    指定した名前でこの塗装を保存します。名前は標準塗装や他のMODが提供する塗装と同じにはできません。まだ存在しない名前を使うと、その名前の新しい塗装として保存されます。
  livery_gui_favorite_button_header: |-
    お気に入り切替
  livery_gui_favorite_button_text: |-
    この塗装をお気に入りにします。お気に入りは塗装リストの前方に残ります。
  livery_gui_hints_header: |-
    ヒント
  livery_gui_hints_basic_text: |-
    スライダーをクリックするか、クリックしてドラッグすると設定できます。
    
    保存を忘れないでください。
    通常の値は0から1です。それ以外の値も使える場合がありますが、問題を起こすことがあります。
    
    キーボードの「カメラ移動」（上下左右）キーで視点を調整できます。
  livery_gui_hints_precise_left_text: |-
    細かく調整するには：
    右クリックを押したまま、マウスを左右に動かします。
    速度変更：SHIFT、ALT、CTRLを押しながら操作します。
  livery_gui_hints_precise_drag_text: |-
    細かく調整するには：
    右クリックを押したまま、マウスを左右に動かします。
    速度変更：SHIFT、ALT、CTRLを押しながら操作します。
  livery_gui_pilot_livery_slot_marker_header: |-
    パイロット塗装
  livery_gui_pilot_livery_slot_marker_text: |-
    パイロット自身の塗装セットがこのスロットに適用されています。このパイロットが乗るどのメカでも、このスロットにこの塗装が適用されます。注意：「+」付きのスロットには子スロットがあり、親スロットの影響を受けます。
  livery_gui_mech_livery_slot_marker_header: |-
    メカ基本塗装
  livery_gui_mech_livery_slot_marker_text: |-
    このスロットにはパイロット塗装が割り当てられていません。メカ本体の基本塗装がこのスロットを制御します。このスロットに塗装を割り当てると、パイロット塗装セットに追加されます。
  livery_gui_livery_name_input: |-
    塗装名
  livery_gui_pilot_none: |-
    [なし]
  livery_gui_supporter_pattern_none: |-
    なし (w=0.0)
  livery_gui_supporter_pattern_dots: |-
    ドット (w=1.0)
  livery_gui_supporter_pattern_lines: |-
    ライン (w=2.0)
  livery_gui_supporter_pattern_sheen: |-
    ツヤ (w=3.0)
  livery_gui_message_load_failed: |-
    LiveryGUI: {0} 個の塗装を読み込めませんでした。詳細は Player.log を確認してください。 [sp=s_text_24_exclamation]
  livery_gui_message_save_blocked_name: |-
    不可。塗装名を変更してください。現在の名前は LiveryGUI のものではありません。 [sp=s_icon_l32_cancel]
  livery_gui_message_save_failed: |-
    保存に失敗しました。詳細は Player.log を確認してください。 [sp=s_text_24_exclamation]
  livery_gui_message_livery_name_exists: |-
    不可。同じ名前の塗装がすでに存在します。 [sp=s_icon_l32_cancel]
  livery_gui_message_save_livery_sets_error: |-
    塗装セットの保存エラー (LiveryGUI)。 [sp=s_icon_l32_cancel]
  livery_gui_message_load_livery_sets_error: |-
    塗装セットの読み込みエラー (LiveryGUI)。 [sp=s_icon_l32_cancel]
  livery_gui_message_init_livery_sets_error: |-
    塗装セットの初期化エラー (LiveryGUI)。 [sp=s_icon_l32_cancel]
