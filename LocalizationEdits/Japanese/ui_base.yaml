    通常の透明度というより、明るさ/コントラスト調整に近い動作です。極端な値は変わった結果を生むことがあります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_contentx_text: |-
    Supporter Upgrade DLC の重ね模様の赤量を設定します。Supporter Upgrade DLC がインストールされていて、「なし」以外の模様が選択されている場合だけ表示されます（Supporter DLC W 設定）。
    
    値は加算式で、強い発光やブルームを作れます。負にしすぎると効果が消えることがあります。正の値と負の値を混ぜると、(R,G,B)=(+5, -5, -1.8) のような変わった発光になることがあります。
  livery_gui_slider_contenty_text: |-
    Supporter Upgrade DLC の重ね模様の緑量を設定します。Supporter Upgrade DLC がインストールされていて、「なし」以外の模様が選択されている場合だけ表示されます（Supporter DLC W 設定）。
    
    値は加算式で、強い発光やブルームを作れます。負にしすぎると効果が消えることがあります。正の値と負の値を混ぜると、(R,G,B)=(+5, -5, -1.8) のような変わった発光になることがあります。
  livery_gui_slider_contentz_text: |-
    Supporter Upgrade DLC の重ね模様の青量を設定します。Supporter Upgrade DLC がインストールされていて、「なし」以外の模様が選択されている場合だけ表示されます（Supporter DLC W 設定）。
    
    値は加算式で、強い発光やブルームを作れます。負にしすぎると効果が消えることがあります。正の値と負の値を混ぜると、(R,G,B)=(+5, -5, -1.8) のような変わった発光になることがあります。
  livery_gui_slider_contentw_text: |-
    Supporter Upgrade DLC の重ね模様を選びます。Supporter Upgrade DLC がインストールされている場合だけ表示されます。模様は「加算式」なので、見えるようにするには黒より明るい色が必要です。
  livery_gui_slider_primaryx_text: |-
    メイン素材の、より鈍い部分でのマットから光沢への反応を調整します。低い値は平たく塗装らしく見え、高い値は反射ハイライトを鋭くします。1に近い値はほぼ鏡面のようになります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primaryy_text: |-
    メイン素材の中間部分でのマットから光沢への反応を調整します。高い値は反射ハイライトを鋭くします。1に近い値はほぼ鏡面のようになります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primaryz_text: |-
    メイン素材の最も明るい、または磨かれた部分でのマットから光沢への反応を調整します。高い値は反射ハイライトを鋭くします。1に近い値はほぼ鏡面のようになります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
  livery_gui_slider_primaryw_text: |-
    メイン素材の「金属感」を調整します。0前後では塗装やプラスチックに近く、素材の角度で見た目が変わりません。1前後では金属に近く、素材の角度でその部分の見た目が変わります。0から1の外の値は実験的です。負の値は「発光」するように見え、大きな正の値は滑らかな光沢の明るさに影響し、(R,G,B)=(1.2, 0.5, 0.8) や (1.2, 0.4, 1.2) のような混合RGB値で特殊な色効果を起こすことがあります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。大きなW値を使う場合は、X,Y,Zの光沢を下げると避けやすくなります。
  livery_gui_slider_secondaryx_text: |-
    サブ素材の、より鈍い部分でのマットから光沢への反応を調整します。低い値は平たく塗装らしく見え、高い値は反射ハイライトを鋭くします。1に近い値はほぼ鏡面のようになります。
    
    特に光沢が強い極端に明るいパーツは、大きな表示不具合を起こすことがあります。
