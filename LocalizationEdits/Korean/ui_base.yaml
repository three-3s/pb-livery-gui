  livery_gui_slider_primaryr_text: |-
    도색의 기본 영역에 적용되는 빨간색 양을 설정합니다.
    
    기본, 보조, 제3 영역은 각 메카 부품의 서로 다른 영역입니다. 일반 색상 값은 보통 0에서 1 사이입니다. 1보다 큰 값은 색을 더 밝게 만들 수 있습니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primaryg_text: |-
    도색의 기본 영역에 적용되는 초록색 양을 설정합니다.
    
    기본, 보조, 제3 영역은 각 메카 부품의 서로 다른 영역입니다. 일반 색상 값은 보통 0에서 1 사이입니다. 1보다 큰 값은 색을 더 밝게 만들 수 있습니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primaryb_text: |-
    도색의 기본 영역에 적용되는 파란색 양을 설정합니다.
    
    기본, 보조, 제3 영역은 각 메카 부품의 서로 다른 영역입니다. 일반 색상 값은 보통 0에서 1 사이입니다. 1보다 큰 값은 색을 더 밝게 만들 수 있습니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primarya_text: |-
    기본 색이 적용되는 강도를 조정합니다. 1 근처가 일반적인 모습입니다. 낮거나 음수인 값은 색을 흰색 쪽으로 밝게 만들고, 높은 값은 검은색 쪽으로 어둡게 만듭니다. 1보다 밝은 색과는 특이하게 상호작용합니다.
    
    일반적인 투명도라기보다 밝기/대비 조절에 가깝고, 극단적인 값은 특이한 결과를 만들 수 있습니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
