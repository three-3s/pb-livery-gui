edits:
  livery_gui_toggle_header: |-
    Livery GUI
  livery_gui_toggle_text: |-
    고급 도색 커스터마이징 옵션 표시/숨기기
  livery_gui_pilot_mode_toggle_header: |-
    조종사 도색 세트 편집 모드 전환
  livery_gui_pilot_mode_toggle_text: |-
    이 모드에서는 선택한 조종사의 도색 세트를 메카 부품에 도색을 배정하여 편집합니다. 조종사 도색이 없는 메카 부품은 투명하게 처리되어 메카 자체의 도색이 보입니다. 예를 들어 메카 편집 모드에서 메카를 회색으로 칠한 뒤 조종사 편집 모드에서 상체에 빨간 도색을 배정할 수 있습니다. 그 조종사가 그 메카를 조종하면 메카는 회색에 빨간 상체가 됩니다. 이 조종사가 배정된 어떤 메카든 상체가 빨갛게 표시됩니다.
  livery_gui_pilot_mode_base_toggle_header: |-
    메카 도색 표시/숨기기
  livery_gui_pilot_mode_base_toggle_text: |-
    조종사 도색 아래의 메카 기본 도색을 표시하거나 숨깁니다. 이 편집기 안의 보기만 영향을 받습니다. 도색 슬롯을 오른쪽 클릭하면 해당 슬롯의 조종사 도색을 해제할 수 있습니다. 참고: “+”가 있는 슬롯에 도색을 배정하면 그 안의 모든 부품에도 영향을 줍니다.
  livery_gui_previous_pilot_header: |-
    이전 조종사
  livery_gui_previous_pilot_text: |-
    이전 조종사를 선택합니다. 조종사 도색 세트 편집 모드에서 어떤 조종사의 도색 세트를 편집할지 정합니다. 이 작업은 조종사를 메카에 배정하지 않습니다. 조종사 배정은 임무 브리핑에서 합니다.
  livery_gui_next_pilot_header: |-
    다음 조종사
  livery_gui_next_pilot_text: |-
    다음 조종사를 선택합니다. 조종사 도색 세트 편집 모드에서 어떤 조종사의 도색 세트를 편집할지 정합니다. 이 작업은 조종사를 메카에 배정하지 않습니다. 조종사 배정은 임무 브리핑에서 합니다.
  livery_gui_reset_button_header: |-
    변경 되돌리기
  livery_gui_reset_button_text: |-
    이 도색을 마지막으로 저장한 값으로 되돌립니다.
  livery_gui_save_button_header: |-
    도색 저장
  livery_gui_save_button_text: |-
    입력한 이름으로 이 도색을 저장합니다. 이름은 기본 도색이나 모드가 제공하는 도색과 같을 수 없습니다. 아직 없는 이름을 사용하면 그 이름의 새 도색으로 저장됩니다.
  livery_gui_favorite_button_header: |-
    즐겨찾기 전환
  livery_gui_favorite_button_text: |-
    이 도색을 즐겨찾기로 표시합니다. 즐겨찾기는 도색 목록 앞쪽에 유지됩니다.
  livery_gui_hints_header: |-
    힌트
  livery_gui_hints_basic_text: |-
    슬라이더를 클릭하거나 클릭 후 끌어서 설정합니다.
    
    저장을 잊지 마세요.
    슬라이더의 일반 값은 0에서 1 사이입니다. 다른 값도 작동할 수 있지만 문제가 생길 수 있습니다.
    
    키보드의 “카메라 이동”(상/하/좌/우) 키로 시점을 조정할 수 있습니다.
  livery_gui_hints_precise_left_text: |-
    정밀 조정:
    오른쪽 클릭을 누른 채 마우스를 좌우로 움직입니다.
    속도 변경: SHIFT, ALT 또는 CTRL을 누르세요.
  livery_gui_hints_precise_drag_text: |-
    정밀 조정:
    오른쪽 클릭을 누른 채 마우스를 좌우로 움직입니다.
    속도 변경: SHIFT, ALT 또는 CTRL을 누르세요.
  livery_gui_pilot_livery_slot_marker_header: |-
    조종사 도색
  livery_gui_pilot_livery_slot_marker_text: |-
    조종사 자신의 도색 세트가 이 슬롯에 적용됩니다. 이 조종사가 조종하는 모든 메카의 이 슬롯에 이 도색이 적용됩니다. 참고: “+”가 표시된 슬롯에는 자식 슬롯이 있으며 부모 슬롯의 영향을 받습니다.
  livery_gui_mech_livery_slot_marker_header: |-
    메카 기본 도색
  livery_gui_mech_livery_slot_marker_text: |-
    이 슬롯에는 조종사 도색이 배정되지 않았습니다. 메카 자체의 기본 도색이 이 슬롯을 제어합니다. 이 슬롯에 도색을 배정하면 조종사 도색 세트에 배정됩니다.
  livery_gui_livery_name_input: |-
    도색 이름
  livery_gui_pilot_none: |-
    [없음]
  livery_gui_supporter_pattern_none: |-
