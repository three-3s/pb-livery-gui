  livery_gui_slider_contentx_text: |-
    Supporter Upgrade DLC 오버레이 무늬의 빨간색 양을 설정합니다. Supporter Upgrade DLC가 설치되어 있고 “없음”이 아닌 무늬가 선택된 경우에만 보입니다(Supporter DLC W 설정).
    
    값은 가산 방식이며 밝은 발광이나 블룸을 만들 수 있습니다. 너무 음수인 값은 효과를 비활성화할 수 있습니다. 양수와 음수를 섞으면 (R,G,B)=(+5, -5, -1.8) 같은 특이한 발광이 생길 수 있습니다.
