    Supporter Upgrade DLC 오버레이 무늬의 파란색 양을 설정합니다. Supporter Upgrade DLC가 설치되어 있고 “없음”이 아닌 무늬가 선택된 경우에만 보입니다(Supporter DLC W 설정).
    
    값은 가산 방식이며 밝은 발광이나 블룸을 만들 수 있습니다. 너무 음수인 값은 효과를 비활성화할 수 있습니다. 양수와 음수를 섞으면 (R,G,B)=(+5, -5, -1.8) 같은 특이한 발광이 생길 수 있습니다.
  livery_gui_slider_contentw_text: |-
    Supporter Upgrade DLC 오버레이 무늬를 선택합니다. Supporter Upgrade DLC가 설치된 경우에만 보입니다. 무늬는 “가산” 방식이므로 보이려면 색이 검정보다 밝아야 합니다.
  livery_gui_slider_primaryx_text: |-
    기본 재질의 더 탁한 영역에서 무광에서 유광으로 변하는 반응을 조절합니다. 낮은 값은 더 평평하고 도색된 느낌이며, 높은 값은 더 선명한 반사 하이라이트를 만듭니다. 1에 가까운 값은 거의 거울처럼 보입니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primaryy_text: |-
    기본 재질의 중간 영역에서 무광에서 유광으로 변하는 반응을 조절합니다. 높은 값은 더 선명한 반사 하이라이트를 만듭니다. 1에 가까운 값은 거의 거울처럼 보입니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primaryz_text: |-
    기본 재질의 가장 밝거나 가장 광택이 나는 영역에서 무광에서 유광으로 변하는 반응을 조절합니다. 높은 값은 더 선명한 반사 하이라이트를 만듭니다. 1에 가까운 값은 거의 거울처럼 보입니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
  livery_gui_slider_primaryw_text: |-
    기본 재질의 “금속감”을 조절합니다. 0 근처에서는 페인트나 플라스틱처럼 동작하여 재질의 각도가 외형에 영향을 주지 않습니다. 1 근처에서는 금속처럼 동작하여 재질의 각도가 해당 부분의 외형에 영향을 줍니다. 0에서 1 밖의 값은 실험적입니다. 음수 값은 “빛나는” 것처럼 보이며, 큰 양수 값은 부드러운 광택의 밝기에 영향을 주고 (R,G,B)=(1.2, 0.5, 0.8) 또는 (1.2, 0.4, 1.2) 같은 혼합 RGB 값에서 특이한 색 효과를 낼 수 있습니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다. 큰 W 값을 사용할 때는 X,Y,Z 광택을 낮추면 문제를 줄이는 데 도움이 됩니다.
  livery_gui_slider_secondaryx_text: |-
