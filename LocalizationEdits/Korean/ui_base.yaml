  livery_gui_slider_effectx_text: |-
    기본 도색 영역의 “무지갯빛 효과”를 조절합니다. 양수 값은 더 강한 무지개빛으로, 음수 값은 진주빛에 가까운 모습으로 기울어집니다. 0 근처 값은 거의 또는 전혀 효과가 없습니다. 큰 양수나 음수 값은 “특이한” 모습이 됩니다. “금속감”과 부품의 R,G,B 색이 결과에 영향을 줍니다.
    
    특히 광택이 강한 매우 밝은 부품은 심각한 시각적 문제를 일으킬 수 있습니다.
