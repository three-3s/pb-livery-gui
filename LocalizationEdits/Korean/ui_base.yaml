    LiveryGUI: 도색 {0}개를 불러오지 못했습니다. 자세한 내용은 Player.log를 확인하세요. [sp=s_text_24_exclamation]
  livery_gui_message_save_blocked_name: |-
    안 됩니다. 도색 이름을 바꾸세요. 현재 이름은 LiveryGUI가 소유하지 않습니다. [sp=s_icon_l32_cancel]
  livery_gui_message_save_failed: |-
    저장 실패. 자세한 내용은 Player.log를 확인하세요. [sp=s_text_24_exclamation]
  livery_gui_message_livery_name_exists: |-
